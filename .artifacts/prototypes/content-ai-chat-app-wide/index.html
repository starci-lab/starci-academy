<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Content-AI Chat — app-wide + context pill (retrieval, no slash)</title>
<style>
  :root{--bg:#faf7f5;--surface:#fff;--surface2:#f6f2ef;--border:#e7e0db;--fg:#241c1a;--muted:#8a7d76;
    --accent:#ec4899;--accent-soft:#fce7f3;--accent-soft-fg:#9d1f5f;--default:#f1ece9;
    --success-soft:#e3f5ee;--success-fg:#136b4f;--info-soft:#e6f0fb;--info-fg:#1f5b96;--warn-soft:#fbf0dd;--warn-fg:#8a5510;}
  *{box-sizing:border-box}
  body{margin:0;font-family:ui-sans-serif,system-ui,"Segoe UI",sans-serif;background:var(--bg);color:var(--fg);height:100vh;overflow:hidden}
  .top{display:flex;flex-direction:column;gap:8px;padding:9px 16px;border-bottom:1px solid var(--border);background:var(--surface);z-index:60;position:relative}
  .top b{font-size:13px}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:999px;overflow:hidden;flex-wrap:wrap}
  .seg button{border:0;background:transparent;padding:6px 11px;font-size:11.5px;font-weight:600;cursor:pointer;color:var(--muted)}
  .seg button.on{background:var(--accent-soft);color:var(--accent-soft-fg)}
  .seg.alt button.on{background:var(--default);color:var(--fg)}
  .lbl{font-size:11px;color:var(--muted)}
  .ml{margin-left:auto}
  .stage{position:relative;height:calc(100vh - 88px);overflow:hidden;transition:padding-right .18s}
  .shellnav{display:flex;gap:4px;padding:8px 40px 0;border-bottom:1px solid var(--border);background:var(--surface2)}
  .shellnav button{border:0;background:transparent;padding:8px 12px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
  .shellnav button.on{color:var(--accent-soft-fg);border-bottom-color:var(--accent)}
  .lesson{height:calc(100% - 37px);overflow:auto;padding:26px 40px}
  .lesson h1{font-size:24px;margin:0 0 4px}.lesson .crumb{font-size:12px;color:var(--muted);margin-bottom:14px}
  .lesson p{max-width:640px;color:#4a4340;line-height:1.65;font-size:14px}
  .lesson code{background:var(--default);border-radius:6px;padding:1px 6px;font-family:ui-monospace,monospace;font-size:12.5px}
  .lesson .sel{background:#fde68a;border-radius:3px;padding:0 2px;box-shadow:0 0 0 1px #f0c000}
  .placeholder{max-width:640px;border:1px dashed var(--border);border-radius:16px;padding:22px;color:var(--muted);font-size:13px}
  .fab{position:absolute;right:16px;bottom:24px;width:52px;height:52px;border-radius:999px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px -6px rgba(236,72,153,.5);cursor:pointer;z-index:50;font-size:22px}
  .panel{position:absolute;background:var(--surface);display:flex;flex-direction:column;z-index:55;overflow:hidden}
  .mode-rail .panel{right:0;top:0;bottom:0;width:400px;border-left:1px solid var(--border);box-shadow:-8px 0 24px -12px rgba(0,0,0,.12)}
  .mode-drawer .panel{right:0;top:0;bottom:0;width:420px;border-left:1px solid var(--border);box-shadow:-16px 0 48px -12px rgba(0,0,0,.28)}
  .scrim{position:absolute;inset:0;background:rgba(0,0,0,.28);z-index:52;display:none}
  .mode-drawer .scrim{display:block}
  .ph{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border)}
  .ph .ptitle{font-size:13px;font-weight:700;min-width:0;flex:1}
  .icobtn{width:30px;height:30px;border-radius:8px;border:0;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
  .icobtn:hover{background:var(--default)}
  .thread{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:12px;background:var(--bg)}
  .bub{max-width:86%;font-size:13px;line-height:1.55;padding:10px 12px;border-radius:16px}
  .bub.me{align-self:flex-end;background:var(--accent);color:#fff}
  .bub.ai{align-self:flex-start;background:var(--surface);border:1px solid var(--border);color:#241c1a}
  .emptywrap{margin:auto;text-align:center;display:flex;flex-direction:column;gap:12px;align-items:center;padding:10px}
  .emptywrap .ic{font-size:30px}
  .ttl{font-size:14px;font-weight:600}
  .chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
  .chip{font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:6px 11px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .chip:hover{border-color:var(--accent)}
  .chip.retr{border-color:var(--accent);color:var(--accent-soft-fg)}
  .hint{font-size:11px;color:var(--muted)}
  .tool{align-self:stretch;background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden}
  .tool .th{font-size:12px;font-weight:600;color:var(--muted);padding:10px 12px 6px;display:flex;align-items:center;gap:6px}
  .tool .r{display:flex;align-items:center;gap:8px;padding:9px 12px;border-top:1px solid var(--border);font-size:13px;cursor:pointer}
  .tool .r:hover{background:var(--default)}
  .tool .r .k{font-size:10px;color:var(--muted)}
  .tool .all{padding:9px 12px;border-top:1px solid var(--border);color:var(--accent-soft-fg);font-size:12.5px;font-weight:600;cursor:pointer}
  .tool .r .lock{margin-left:auto;font-size:10px;color:var(--warn-fg);background:var(--warn-soft);border-radius:999px;padding:2px 7px;white-space:nowrap}
  .ctxbar{padding:8px 12px 0;display:flex;flex-direction:column;gap:6px}
  .ctxpill{display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:12px;padding:7px 10px;font-size:12px;background:var(--surface)}
  .ctxpill.lesson{border-color:var(--accent);background:var(--accent-soft)}
  .ctxpill.course{border-color:var(--info-fg);background:var(--info-soft)}
  .ctxpill.sel{border-color:#f0c000;background:#fef6da}
  .ctxpill .ic{font-size:14px}
  .ctxpill .meta{min-width:0;flex:1;display:flex;flex-direction:column;line-height:1.3}
  .ctxpill .meta small{font-size:10px;color:var(--muted)}
  .ctxpill .meta b{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ctxpill .swap{font-size:11px;font-weight:600;color:var(--accent-soft-fg);cursor:pointer;background:transparent;border:0;white-space:nowrap}
  .ctxpill .x{cursor:pointer;color:var(--muted);font-size:14px}
  .ctxhint{font-size:10.5px;color:var(--muted);padding:0 2px}
  .composer{border-top:1px solid var(--border);padding:0 0 10px;background:var(--surface);display:flex;flex-direction:column;gap:8px}
  .cbox{display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:16px;padding:8px 10px;margin:10px 12px 0}
  .cbox input{flex:1;border:0;outline:0;background:transparent;font-size:13px}
  .tools{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;flex-shrink:0;font-size:15px}
  .tools.hidden{display:none}
  .send{width:32px;height:32px;border-radius:999px;background:var(--accent);color:#fff;border:0;cursor:pointer;flex-shrink:0}
  .crow{display:flex;align-items:center;gap:8px;padding:0 12px}
  .modelchip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;background:var(--default);color:var(--fg);border:0;border-radius:999px;padding:5px 10px;cursor:pointer}
  .tag{display:inline-block;font-size:10px;border:1px dashed var(--accent);color:var(--accent-soft-fg);border-radius:6px;padding:1px 5px}
  .toolspop{position:absolute;left:12px;right:52px;bottom:58px;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 12px 32px -10px rgba(0,0,0,.2);overflow:hidden;display:none;z-index:6}
  .show-tools .toolspop{display:block}
  .toolspop .h{font-size:10.5px;color:var(--muted);padding:8px 12px 4px}
  .toolspop .tr{display:flex;align-items:center;gap:9px;padding:8px 12px;font-size:13px;cursor:pointer;border-top:1px solid var(--border)}
  .toolspop .tr:hover{background:var(--accent-soft)}
  .note{position:absolute;left:16px;bottom:14px;max-width:660px;font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 12px;z-index:58;line-height:1.6}
  .note b{color:var(--fg)}
  /* in-panel views (conversations / see-all) — swap toàn thân panel, ẩn composer */
  .hide-composer .composer{display:none}
  .view{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
  .back{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;font-weight:600}
  .lc{border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .lc .lr{display:flex;align-items:center;gap:9px;padding:10px 12px;border-top:1px solid var(--border);cursor:pointer;font-size:13px}
  .lc .lr:first-child{border-top:0}
  .lc .lr:hover{background:var(--default)}
  .lc .lr .ic{font-size:14px}
  .lc .lr .m{min-width:0;flex:1;display:flex;flex-direction:column;line-height:1.35}
  .lc .lr .m small{font-size:10.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lc .lr .kchip{font-size:9.5px;border-radius:999px;padding:2px 7px;background:var(--default);color:var(--muted)}
  .lc .lr .lock{margin-left:auto;font-size:10px;color:var(--warn-fg);background:var(--warn-soft);border-radius:999px;padding:2px 7px;white-space:nowrap}
</style>
</head>
<body class="mode-rail">
  <div class="top">
    <div class="row">
      <b>Content-AI Chat · app-wide + context pill · retrieval (no slash)</b>
      <span class="lbl ml">Tab:</span>
      <div class="seg" id="tab">
        <button data-t="content" class="on">📖 Đọc bài</button>
        <button data-t="flashcards">🗂 Ôn flashcard</button>
        <button data-t="league">🏆 Xếp hạng</button>
      </div>
    </div>
    <div class="row">
      <span class="lbl">Ngữ cảnh:</span>
      <div class="seg alt" id="ctx">
        <button data-c="lesson" class="on">📖 Bài đang đọc</button>
        <button data-c="selection">🔖 Đoạn bôi đen</button>
        <button data-c="course">✦ Cả khóa</button>
      </div>
      <span class="lbl">State:</span>
      <div class="seg alt" id="state">
        <button data-s="empty" class="on">Rỗng (chip)</button>
        <button data-s="retr">Kết quả retrieval</button>
        <button data-s="answer">Trả lời (chat)</button>
        <button data-s="tools">Nút công cụ</button>
        <button data-s="hist">Lịch sử (mixed)</button>
        <button data-s="seeall">Xem tất cả</button>
      </div>
      <span class="lbl">Present:</span>
      <div class="seg" id="mode">
        <button data-m="rail" class="on">Rail</button>
        <button data-m="drawer">Drawer</button>
      </div>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="shellnav">
      <button data-t="content" class="on">Nội dung</button>
      <button data-t="flashcards">Ôn tập</button>
      <button data-t="league">Bảng xếp hạng</button>
    </div>
    <div class="lesson" id="lesson"><div id="lessonBody"></div></div>

    <div class="scrim"></div>
    <div class="fab" id="fab">✦</div>

    <div class="panel" id="panel">
      <div class="ph">
        <button class="icobtn" title="Lịch sử">🕓</button>
        <button class="icobtn" title="Trò chuyện mới">＋</button>
        <div class="ptitle">StarCi AI</div>
        <button class="icobtn" title="Đóng">✕</button>
      </div>

      <div class="thread" id="thread"></div>

      <div class="toolspop">
        <div class="h">Công cụ tìm trong khóa (retrieval)</div>
        <div class="tr">🏴 Thử thách liên quan</div>
        <div class="tr">🗂 Flashcard liên quan</div>
        <div class="tr">📘 Bài học liên quan</div>
        <div class="tr">🏁 Nhiệm vụ / capstone</div>
        <div class="tr">✦ Mọi thứ liên quan</div>
      </div>

      <div class="composer">
        <div class="ctxbar" id="ctxbar"></div>
        <div class="cbox">
          <input id="cinput" placeholder="Hỏi… (vd: 'tìm thử thách về pipe')"/>
          <button class="tools" id="toolsBtn" title="Công cụ">⌥</button>
          <button class="send">➤</button>
        </div>
        <div class="crow">
          <button class="modelchip">✦ Tự động ▾ <span class="tag">model picker inline</span></button>
        </div>
      </div>
    </div>
  </div>

  <div class="note" id="note"></div>

<script>
let tab='content', ctx='lesson', state='empty', mode='rail';

const LESSON_TABS = {
  content: `<div class="crumb">Nền tảng Linux cho DevOps › Shell &amp; Filesystem</div>
    <h1>Shell &amp; Filesystem</h1>
    <p>Khi bạn gõ một đường dẫn, shell phân giải theo <span class="sel">Filesystem Hierarchy Standard</span>: <code>/etc</code> chứa config, <code>/usr/bin</code> chứa binary.</p>
    <p>Bài học này giúp bạn tự tin trên terminal: điều hướng cây thư mục, đọc/ghi file, ghép lệnh bằng redirection + pipe.</p>`,
  flashcards: `<div class="crumb">Nền tảng Linux cho DevOps</div><h1>Ôn tập</h1>
    <div class="placeholder">15 bộ thẻ — KHÔNG có "bài đang đọc". Trước đây FAB tự ẩn ở đây. Giờ FAB vẫn hiện, context tự chuyển <b>Cả khóa</b>.</div>`,
  league: `<div class="crumb">Nền tảng Linux cho DevOps</div><h1>Bảng xếp hạng</h1>
    <div class="placeholder">Tab social — cũng không có bài mở. Context = Cả khóa.</div>`,
};

function normalizeCtx(){ if(tab!=='content' && ctx!=='course'){ ctx='course'; } }

function ctxbarHtml(){
  if(ctx==='selection'){
    return `<div class="ctxpill sel">
      <span class="ic">🔖</span>
      <span class="meta"><small>Đang hỏi về đoạn đã chọn</small><b>"Filesystem Hierarchy Standard"</b></span>
      <span class="x" title="Bỏ chọn đoạn → về context bài">✕</span>
    </div>
    <div class="ctxhint">Bôi đen trong bài → hỏi thẳng về đoạn đó (lớp hẹp nhất). Bỏ ✕ để quay về cả bài.</div>`;
  }
  if(ctx==='course'){
    const forced = tab!=='content';
    return `<div class="ctxpill course">
      <span class="ic">✦</span>
      <span class="meta"><small>Đang hỏi về</small><b>Cả khóa · Nền tảng Linux cho DevOps</b></span>
      ${forced?'':'<button class="swap" data-to="lesson">↩ Về bài đang đọc</button>'}
    </div>
    <div class="ctxhint">${forced?'Không mở bài nào ở tab này → mặc định neo cả khóa (RAG course-wide).':'Đang neo toàn khóa — trả lời tìm khắp khóa thay vì 1 bài.'}</div>`;
  }
  return `<div class="ctxpill lesson">
    <span class="ic">📖</span>
    <span class="meta"><small>Đang hỏi về bài</small><b>Shell &amp; Filesystem</b></span>
    <button class="swap" data-to="course">⤢ Hỏi cả khóa</button>
  </div>
  <div class="ctxhint">Mặc định khi đang đọc = neo vào chính bài này. Đổi sang cả khóa nếu muốn tìm rộng hơn.</div>`;
}

function emptyHtml(){
  if(ctx==='course'){
    return `<div class="emptywrap"><div class="ic">✦</div>
      <div class="ttl">Hỏi StarCi AI về cả khóa</div>
      <div class="hint">Không mở bài cụ thể — trả lời tìm khắp khóa (RAG course-wide).</div>
      <div class="chips">
        <span class="chip retr">🔎 Tìm nội dung về Kafka</span>
        <span class="chip retr">🏴 Thử thách theo chủ đề…</span>
        <span class="chip">🧭 Tôi nên học gì tiếp?</span>
      </div>
      <div class="hint">Hoặc gõ thẳng câu hỏi / "tìm &lt;gì đó&gt;".</div>
    </div>`;
  }
  if(ctx==='selection'){
    return `<div class="emptywrap"><div class="ic">🔖</div>
      <div class="ttl">Hỏi về đoạn đã chọn</div>
      <div class="hint">"Filesystem Hierarchy Standard"</div>
      <div class="chips">
        <span class="chip">Giải thích đoạn này</span>
        <span class="chip">Cho ví dụ</span>
        <span class="chip">Nói đơn giản hơn</span>
      </div>
    </div>`;
  }
  return `<div class="emptywrap"><div class="ic">✦</div>
    <div class="ttl">Hỏi StarCi AI về bài học này</div>
    <div class="hint">Neo vào nội dung đang mở — miễn phí, không tốn AI credit.</div>
    <div class="chips">
      <span class="chip">Tóm tắt bài</span>
      <span class="chip">Phần khó nhất?</span>
      <span class="chip">Cho ví dụ</span>
      <span class="chip retr">🏴 Thử thách liên quan</span>
      <span class="chip retr">🗂 Flashcard liên quan</span>
    </div>
    <div class="hint">Chip "liên quan" = tìm (retrieval). 3 chip đầu = hỏi thường (chat).</div>
  </div>`;
}

const THREADS = {
  empty: () => emptyHtml(),
  retr: () => `<div class="bub me">tìm thử thách liên quan</div>
    <div class="tool">
      <div class="th">🏴 Thử thách liên quan — chọn để mở</div>
      <div class="r"><span>🏴</span><div><div>Tổ chức lại thư mục log hỗn độn</div><div class="k">Nền tảng Linux · Middle</div></div></div>
      <div class="r"><span>🏴</span><div><div>Xây pipeline một dòng: tìm file, lọc, đếm</div><div class="k">Nền tảng Linux · Senior</div></div></div>
      <div class="r"><span>🏴</span><div><div>Viết script backup /etc theo lịch</div><div class="k">Nền tảng Linux · Middle</div></div><span class="lock">🔒 Ghi danh để mở</span></div>
      <div class="all">Xem tất cả trong khóa →</div>
    </div>`,
  answer: () => ctx==='course'
    ? `<div class="bub me">Kafka được dạy ở đâu trong khóa?</div>
       <div class="bub ai">Trong khóa này Kafka nằm ở module <b>Message Queue &amp; Event-driven</b> (bài 3–4). Mình tìm thấy 2 bài + 1 thử thách liên quan — muốn mình mở list không?</div>`
    : `<div class="bub me">Giải thích path resolution trong bài này</div>
       <div class="bub ai">Shell phân giải đường dẫn theo <b>FHS</b>: <code>/etc</code> = config, <code>/usr/bin</code> = binary. Tuyệt đối bắt đầu từ <code>/</code>, tương đối tính từ <code>pwd</code><span style="opacity:.5">▍</span></div>`,
  tools: () => emptyHtml(),
  // Lịch sử hội thoại — TRỘN session gắn-bài (📖) + course-general (✦), cùng enrollment
  hist: () => `<div class="view">
    <div class="back">← Trò chuyện</div>
    <div class="lc">
      <div class="lr"><span class="ic">📖</span><div class="m"><b>Giải thích inode &amp; hard link</b><small>Shell &amp; Filesystem · 4 lượt</small></div></div>
      <div class="lr"><span class="ic">📖</span><div class="m"><b>So sánh redirection vs pipe</b><small>Shell &amp; Filesystem · 6 lượt</small></div></div>
      <div class="lr"><span class="ic">✦</span><div class="m"><b>Tôi nên học gì tiếp theo?</b><small>Chung khóa · không gắn bài · 2 lượt</small></div></div>
      <div class="lr"><span class="ic">📖</span><div class="m"><b>Vì sao /etc chứa config?</b><small>Biến môi trường &amp; Config · 3 lượt</small></div></div>
    </div>
    <div class="hint">Trộn 2 loại: 📖 gắn 1 bài (originContentId) · ✦ course-general (originContentId NULL — cần schema nullable). Search xuyên suốt cùng enrollment.</div>
  </div>`,
  // "Xem tất cả" — full search view (đích nút "Xem tất cả" trong retrieval result)
  seeall: () => `<div class="view">
    <div class="back">← Trò chuyện</div>
    <div class="lc">
      <div class="lr"><span class="kchip">Thử thách</span><div class="m"><b>Tổ chức lại thư mục log hỗn độn</b><small>Nền tảng Linux · Middle</small></div></div>
      <div class="lr"><span class="kchip">Thử thách</span><div class="m"><b>Xây pipeline một dòng: tìm file, lọc, đếm</b><small>Nền tảng Linux · Senior</small></div></div>
      <div class="lr"><span class="kchip">Bài học</span><div class="m"><b>Redirection &amp; Pipe nâng cao</b><small>Nền tảng Linux · Module 3</small></div><span class="lock">🔒 Ghi danh</span></div>
      <div class="lr"><span class="kchip">Flashcard</span><div class="m"><b>Bộ thẻ: Lệnh xử lý text</b><small>12 thẻ</small></div></div>
      <div class="lr"><span class="kchip">Nhiệm vụ</span><div class="m"><b>Capstone: script backup tự động</b><small>Dự án cá nhân</small></div><span class="lock">🔒 Ghi danh</span></div>
    </div>
    <div class="hint">Mọi kind trong 1 list (EntityResultRow + kind-chip). Trial: item premium 🔒 + CTA ghi danh (phễu).</div>
  </div>`,
};

const PANEL_VIEWS = ['hist','seeall'];

function render(){
  normalizeCtx();
  const isView = PANEL_VIEWS.includes(state);
  document.body.className = 'mode-'+mode + (state==='tools'?' show-tools':'') + (isView?' hide-composer':'');
  document.getElementById('lessonBody').innerHTML = LESSON_TABS[tab];
  document.getElementById('thread').innerHTML = THREADS[state]();
  document.getElementById('ctxbar').innerHTML = ctxbarHtml();
  document.getElementById('cinput').value = '';
  document.getElementById('toolsBtn').classList.toggle('hidden', state!=='tools');

  [...document.querySelectorAll('#ctx button')].forEach(b=>{
    b.classList.toggle('on', b.dataset.c===ctx);
    const disabled = (tab!=='content' && b.dataset.c!=='course');
    b.style.opacity = disabled?'.35':'1';
    b.style.pointerEvents = disabled?'none':'auto';
  });
  [...document.querySelectorAll('#tab button')].forEach(b=>b.classList.toggle('on', b.dataset.t===tab));
  [...document.querySelectorAll('.shellnav button')].forEach(b=>b.classList.toggle('on', b.dataset.t===tab));
  [...document.querySelectorAll('#state button')].forEach(b=>b.classList.toggle('on', b.dataset.s===state));
  [...document.querySelectorAll('#mode button')].forEach(b=>b.classList.toggle('on', b.dataset.m===mode));

  const CTXNOTE = {
    lesson:'<b>Context = Bài đang đọc</b> (mặc định khi ở tab Đọc bài). Pill hồng cho biết AI neo vào chính bài này. Nút "⤢ Hỏi cả khóa" nới rộng khi cần.',
    selection:'<b>Context = Đoạn bôi đen</b> — lớp HẸP nhất, chồng lên context bài (đã có: ContentAiSelectionAsk). Bỏ ✕ → về cả bài.',
    course:'<b>Context = Cả khóa</b> — mặc định ở tab không có bài (flashcard/xếp hạng), hoặc khi user tự nới. RAG course-wide thay vì 1 body bài.',
  };
  const STATENOTE = {
    empty:'Chip ĐỔI theo context: bài→[Tóm tắt/Khó nhất/Ví dụ + chip retrieval]; đoạn→[Giải thích/Ví dụ/Đơn giản]; khóa→[Tìm nội dung/Học gì tiếp]. KHÔNG slash.',
    retr:'Retrieval kích bằng CHIP "liên quan" HOẶC gõ tự nhiên "tìm thử thách…" (detectContentIntent đã có). Ra list bấm được. HỌC THỬ: item premium hiện 🔒 + CTA ghi danh (phễu).',
    answer:'Câu hỏi thường → trả lời chat plain (đúng bản chất). Course-context → câu trả lời có thể kèm gợi ý mở list retrieval.',
    tools:'Nút ⌥ cạnh ô nhập mở menu retrieval — thay slash, khám phá GIỮA cuộc trò chuyện. Bấm, không gõ "/". Thầy chốt LÀM LUÔN đợt 1.',
    hist:'View Lịch sử (in-panel swap) — TRỘN session 📖 gắn-bài + ✦ course-general, cùng enrollment, search xuyên suốt. Composer ẩn khi ở view này.',
    seeall:'View "Xem tất cả" (in-panel swap) — đích nút "Xem tất cả" từ retrieval result: full list mọi kind + kind-chip; trial thấy item premium 🔒 + CTA ghi danh.',
  };
  document.getElementById('note').innerHTML =
    '<b>Không slash.</b> Skills = retrieval qua chip + ngôn ngữ tự nhiên. FAB hiện mọi tab (bỏ gate !contentId).<br>'
    + CTXNOTE[ctx] + '<br>' + STATENOTE[state];
}
document.getElementById('tab').onclick=e=>{if(e.target.dataset.t){tab=e.target.dataset.t; if(state==='answer')state='empty'; render();}};
document.querySelector('.shellnav').onclick=e=>{if(e.target.dataset.t){tab=e.target.dataset.t; if(state==='answer')state='empty'; render();}};
document.getElementById('ctx').onclick=e=>{if(e.target.dataset.c){ctx=e.target.dataset.c;render();}};
document.getElementById('state').onclick=e=>{if(e.target.dataset.s){state=e.target.dataset.s;render();}};
document.getElementById('mode').onclick=e=>{if(e.target.dataset.m){mode=e.target.dataset.m;render();}};
document.getElementById('toolsBtn').onclick=()=>{document.body.classList.toggle('show-tools');};
document.getElementById('ctxbar').addEventListener('click',e=>{
  if(e.target.dataset.to){ctx=e.target.dataset.to;render();}
  if(e.target.classList.contains('x')){ctx='lesson';render();}
});
document.getElementById('thread').addEventListener('click',e=>{
  if(e.target.closest('.back')){state='empty';render();}
});
render();
</script>
</body>
</html>
