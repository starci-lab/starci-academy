<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Content-AI chat — luồng đầy đủ (5 category × 2 trang + cả khóa)</title>
<style>
  :root{
    --bg:#f4eff1; --panel:#fbf8f9; --surface:#ffffff; --border:#e8dde1; --sep:#f1eaed;
    --fg:#1b1719; --muted:#877c81; --faint:#b3a8ad;
    --accent:#e0398a; --accent-soft:#fceef5; --accent-line:#f5c8de;
    --info:#2563eb; --info-soft:#eef4ff; --info-line:#c7dbfe;
    --ok:#0f9d6b; --ok-soft:#e9faf3; --ok-line:#b3ecd3;
    --chal:#e8590c; --chal-soft:#fff1e7; --chal-line:#f6cfae;
    --violet:#7c5cff; --violet-soft:#f1edff; --violet-line:#d8cefb;
    --quiz:#0d9488; --quiz-soft:#e6f7f4; --quiz-line:#a6e6db;
    --amber:#b26a06; --amber-soft:#fdf3e4; --amber-line:#f3daac;
    --r:16px; --r-sm:11px; --r-xs:9px;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
    --shadow:0 1px 2px rgba(27,23,25,.05),0 10px 26px -16px rgba(27,23,25,.22);
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#100c0f; --panel:#191418; --surface:#201a1e; --border:#31272c; --sep:#281f24;
    --fg:#f4edf0; --muted:#a99ea4; --faint:#6c6167;
    --accent:#f472b6; --accent-soft:#31151f; --accent-line:#572036;
    --info:#7aa5ff; --info-soft:#141d2e; --info-line:#26375c;
    --ok:#4fd1a0; --ok-soft:#0e1f18; --ok-line:#1d4034;
    --chal:#ff922b; --chal-soft:#2a1a0e; --chal-line:#4a3117;
    --violet:#b7a4ff; --violet-soft:#1d1730; --violet-line:#372b57;
    --quiz:#2dd4bf; --quiz-soft:#0c211e; --quiz-line:#194a43;
    --amber:#e6a54b; --amber-soft:#291e10; --amber-line:#493416;
    --shadow:0 1px 2px rgba(0,0,0,.35),0 12px 32px -18px rgba(0,0,0,.7);
  }}
  :root[data-theme="light"]{--bg:#f4eff1;--panel:#fbf8f9;--surface:#fff;--border:#e8dde1;--sep:#f1eaed;--fg:#1b1719;--muted:#877c81;--faint:#b3a8ad;--accent:#e0398a;--accent-soft:#fceef5;--accent-line:#f5c8de;--info:#2563eb;--info-soft:#eef4ff;--info-line:#c7dbfe;--ok:#0f9d6b;--ok-soft:#e9faf3;--ok-line:#b3ecd3;--chal:#e8590c;--chal-soft:#fff1e7;--chal-line:#f6cfae;--violet:#7c5cff;--violet-soft:#f1edff;--violet-line:#d8cefb;--quiz:#0d9488;--quiz-soft:#e6f7f4;--quiz-line:#a6e6db;--amber:#b26a06;--amber-soft:#fdf3e4;--amber-line:#f3daac;}
  :root[data-theme="dark"]{--bg:#100c0f;--panel:#191418;--surface:#201a1e;--border:#31272c;--sep:#281f24;--fg:#f4edf0;--muted:#a99ea4;--faint:#6c6167;--accent:#f472b6;--accent-soft:#31151f;--accent-line:#572036;--info:#7aa5ff;--info-soft:#141d2e;--info-line:#26375c;--ok:#4fd1a0;--ok-soft:#0e1f18;--ok-line:#1d4034;--chal:#ff922b;--chal-soft:#2a1a0e;--chal-line:#4a3117;--violet:#b7a4ff;--violet-soft:#1d1730;--violet-line:#372b57;--quiz:#2dd4bf;--quiz-soft:#0c211e;--quiz-line:#194a43;--amber:#e6a54b;--amber-soft:#291e10;--amber-line:#493416;}

  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:var(--sans);font-size:14px;line-height:1.5;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overflow:hidden}
  button{font:inherit;cursor:pointer}

  /* top bar */
  .top{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:9px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:-.01em;font-size:14px}
  .brand .logo{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--violet));display:grid;place-items:center;color:#fff;font-size:14px}
  .brand .tag{font-weight:500;color:var(--muted);font-size:12px;border-left:1px solid var(--border);padding-left:10px;margin-left:2px}
  .spacer{flex:1}
  .tbtn{border:1px solid var(--border);background:var(--surface);color:var(--fg);border-radius:999px;padding:7px 12px;font-size:12.5px;display:inline-flex;align-items:center;gap:6px}
  .tbtn:hover{background:var(--sep)}
  .tbtn.live.on{background:var(--amber-soft);border-color:var(--amber-line);color:var(--amber)}

  /* pager */
  .pager{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--panel);border-bottom:1px solid var(--border);overflow-x:auto}
  .pg-lbl{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);flex:0 0 auto;margin-right:2px}
  .grp{display:flex;align-items:center;gap:0;flex:0 0 auto;border:1px solid var(--border);border-radius:999px;background:var(--surface);overflow:hidden}
  .grp .g-ic{padding:5px 4px 5px 10px;font-size:13px}
  .pg{border:0;background:transparent;color:var(--muted);padding:6px 10px;font-size:12px;display:flex;align-items:center;gap:5px;white-space:nowrap}
  .pg:hover{color:var(--fg)}
  .pg.on{background:var(--fg);color:var(--bg)}
  .pg.sel.on{background:var(--amber);color:#fff}
  .grp .div{width:1px;align-self:stretch;background:var(--border)}
  .pg-course{flex:0 0 auto;border:1px solid var(--info-line);background:var(--info-soft);color:var(--info);border-radius:999px;padding:6px 13px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px}
  .pg-course.on{background:var(--info);color:#fff;border-color:var(--info)}
  .pgcount{margin-left:auto;flex:0 0 auto;font-size:11px;color:var(--faint)}

  /* app body: 3 columns */
  .app{flex:1;min-height:0;display:grid;grid-template-columns:196px 1fr 400px;gap:0}
  @media (max-width:960px){.app{grid-template-columns:1fr}.menu,.rail-wrap{display:none}}

  .menu{border-right:1px solid var(--border);background:var(--panel);padding:12px 10px;overflow-y:auto}
  .menu .mt{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin:12px 8px 5px}
  .mi{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:9px;color:var(--muted);font-size:13px;width:100%;border:0;background:transparent;text-align:left}
  .mi .mic{width:17px;text-align:center;flex:0 0 auto}
  .mi:hover{background:var(--sep);color:var(--fg)}
  .mi.on{background:var(--surface);color:var(--fg);font-weight:600;box-shadow:var(--shadow)}
  .mi.live{background:var(--amber-soft);color:var(--amber);font-weight:600}

  .surface{overflow-y:auto;padding:24px 30px}
  .crumbs{font-size:12px;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .catchip{font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:999px}
  .surface h2{font-size:20px;margin:0 0 10px;letter-spacing:-.015em;max-width:24ch}
  .surface p{margin:0 0 13px;max-width:60ch;color:var(--fg)}
  .surface p.mut{color:var(--muted);font-size:13px}
  .selectable{cursor:text}
  .selectable .hot{background:var(--amber-soft);border-bottom:2px solid var(--amber);border-radius:3px;padding:0 2px;cursor:pointer}
  .selectable .hot:hover{background:var(--amber-line)}
  .codeblk{font-family:var(--mono);font-size:12.5px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--fg);overflow-x:auto;margin:0 0 13px;white-space:pre-wrap;line-height:1.6}
  .qz{border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin:0 0 12px;background:var(--surface);box-shadow:var(--shadow)}
  .qz .opt{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--border);border-radius:9px;margin-top:8px;font-size:13px;color:var(--muted)}
  .selhint{font-size:12px;color:var(--amber);background:var(--amber-soft);border:1px solid var(--amber-line);border-radius:9px;padding:8px 11px;display:inline-flex;align-items:center;gap:7px;margin-top:2px}
  .live-cover{display:none}
  body.live .surface .live-cover{display:flex;flex-direction:column;gap:8px;align-items:flex-start;background:var(--amber-soft);border:1px solid var(--amber-line);color:var(--amber);border-radius:12px;padding:16px;font-size:13px;margin-bottom:14px}

  /* chat rail */
  .rail-wrap{border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;min-height:0}
  .rhead{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:11px 12px;border-bottom:1px solid var(--sep)}
  .pill{flex:1;min-width:0;display:flex;align-items:center;gap:9px;border:1px solid transparent;border-radius:12px;padding:7px 11px}
  .pill .pic{font-size:16px;line-height:1;flex:0 0 auto}
  .pill .ptx{min-width:0;line-height:1.25}
  .pill .pk{display:block;font-size:10px;opacity:.85}
  .pill .pv{display:block;font-size:13px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .iconbtn{width:30px;height:30px;flex:0 0 auto;border:1px solid var(--border);background:var(--surface);border-radius:9px;display:grid;place-items:center;font-size:13px;color:var(--muted)}
  .iconbtn:hover{background:var(--sep)}
  .iconbtn.on{background:var(--accent-soft);border-color:var(--accent-line);color:var(--accent)}

  .backbar{flex:0 0 auto;padding:8px 12px 0}
  .backbtn{width:100%;border:1px dashed var(--info-line);background:var(--info-soft);color:var(--info);border-radius:10px;padding:7px 10px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px}
  .backbtn:hover{background:var(--info);color:#fff;border-style:solid}

  .rbody{flex:1 1 auto;min-height:0;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px}
  .ground{flex:0 0 auto;font-size:11.5px;color:var(--muted);background:var(--panel);border:1px dashed var(--border);border-radius:9px;padding:8px 10px;line-height:1.45}
  .ground b{color:var(--fg);font-weight:600}
  .gate{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:650;padding:2px 7px;border-radius:999px;white-space:nowrap}
  .born{flex:0 0 auto;font-size:11.5px;color:var(--amber);background:var(--amber-soft);border:1px solid var(--amber-line);border-radius:9px;padding:8px 10px;line-height:1.45}
  .msg{max-width:88%;padding:9px 12px;border-radius:13px;font-size:13px;line-height:1.5}
  .msg.me{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
  .msg.ai{align-self:flex-start;background:var(--sep);color:var(--fg);border-bottom-left-radius:4px}
  .msg.ai .g{display:block;font-size:10.5px;color:var(--muted);margin-top:5px}
  .typing{align-self:flex-start;display:flex;gap:3px;padding:11px 13px;background:var(--sep);border-radius:13px}
  .typing i{width:5px;height:5px;border-radius:50%;background:var(--faint);animation:bl 1s infinite}
  .typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
  @keyframes bl{0%,60%,100%{opacity:.3}30%{opacity:1}}
  @media (prefers-reduced-motion:reduce){.typing i{animation:none}}
  .empty{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);text-align:center;gap:6px;padding:20px}
  .empty .eic{font-size:30px;opacity:.45}
  .empty small{font-size:12px;color:var(--faint);max-width:24ch}

  /* dedicated selection view */
  .quote{flex:0 0 auto;display:flex;gap:9px;align-items:flex-start;border:1px solid var(--amber-line);background:var(--amber-soft);border-radius:12px;padding:11px 12px}
  .quote .qm{font-size:18px;color:var(--amber);line-height:1;flex:0 0 auto}
  .quote .qt{font-size:13px;font-style:italic;color:var(--fg);line-height:1.5}
  .asklist{flex:0 0 auto;display:flex;flex-direction:column;gap:7px}
  .askbtn{text-align:left;border:1px solid var(--border);background:var(--surface);border-radius:11px;padding:10px 12px;font-size:13px;color:var(--fg);display:flex;align-items:center;gap:9px}
  .askbtn:hover{border-color:var(--amber-line);background:var(--amber-soft)}
  .askbtn .as{color:var(--amber);flex:0 0 auto}

  .rfoot{flex:0 0 auto;border-top:1px solid var(--sep);padding:10px 12px;display:flex;flex-direction:column;gap:8px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:11.5px;border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:4px 10px;color:var(--muted)}
  .chip:hover{border-color:var(--faint);color:var(--fg)}
  .composer{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);border-radius:13px;padding:6px 6px 6px 12px}
  .composer:focus-within{border-color:var(--accent-line);box-shadow:0 0 0 3px var(--accent-soft)}
  .composer input{flex:1;border:0;background:transparent;font:inherit;font-size:13px;color:var(--fg);outline:none}
  .composer input::placeholder{color:var(--faint)}
  .send{width:33px;height:33px;flex:0 0 auto;border:0;border-radius:10px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:14px}
  .send:disabled{opacity:.4}
  .modelrow{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
  .modelrow .mc{border:1px solid var(--border);border-radius:999px;padding:2px 9px;background:var(--surface)}

  .railcover{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--amber);text-align:center;padding:24px}
  .railcover .lic{font-size:34px}
</style>
</head>
<body>

  <div class="top">
    <div class="brand"><span class="logo">C</span> StarCi <span class="tag">Trò chuyện AI — bản thiết kế duyệt</span></div>
    <span class="spacer"></span>
    <button class="tbtn live" id="livebtn">🔒 Quiz live</button>
    <button class="tbtn" id="themebtn">◑ Sáng / Tối</button>
  </div>

  <div class="pager" id="pager"></div>

  <div class="app">
    <div class="menu" id="menu"></div>
    <div class="surface" id="surface"></div>
    <div class="rail-wrap" id="rail"></div>
  </div>

<script>
/* ---------- data: 5 categories + course ---------- */
const CATS = {
  content:{
    ic:"📖", cls:"content", cat:"Bài học", menu:"content",
    pk:"Đang hỏi về bài", pv:"Bài B — Shell & Filesystem",
    crumb:"Modules · Nền tảng backend", title:"Shell & Filesystem — điều hướng Linux",
    ground:"thân bài + <b>mã nguồn</b> của bài",
    gate:{cls:"paid",t:"Premium → cần ghi danh"},
    sel:"đường dẫn tuyệt đối bắt đầu từ gốc /, tương đối tính từ thư mục hiện tại",
    reply:"Đường dẫn <b>tuyệt đối</b> luôn bắt đầu bằng <code>/</code> (gốc), ví dụ <code>/var/log</code>. <b>Tương đối</b> tính từ nơi bạn đang đứng: <code>../etc</code> = lùi một cấp rồi vào <code>etc</code>.",
  },
  milestone:{
    ic:"🎯", cls:"task", cat:"Dự án (milestone)", menu:"personal",
    pk:"Đang hỏi về task", pv:"Task 2 — Dockerize API",
    crumb:"Dự án cá nhân · Milestone 1", title:"Dockerize API — đóng gói dịch vụ",
    ground:"<b>đề bài + tiêu chí chấm</b> của task (RAG milestone)",
    gate:{cls:"enr",t:"Chỉ người đã ghi danh — không lộ đề"},
    sel:"image cuối phải < 200MB, chạy bằng user non-root, có HEALTHCHECK",
    reply:"Ba tiêu chí đó là điểm chấm cứng: dùng <b>multi-stage build</b> để bỏ devDependencies (giảm size), thêm <code>USER node</code> (non-root), và <code>HEALTHCHECK CMD</code> gọi <code>/health</code>. Mình gợi ý hướng, bạn tự viết Dockerfile nhé.",
  },
  challenges:{
    ic:"⚔️", cls:"chal", cat:"Bài tập (challenge)", menu:"challenges",
    pk:"Đang hỏi về bài tập", pv:"Challenge — FizzBuzz nâng cao",
    crumb:"Bài B · Thử thách 3", title:"FizzBuzz nâng cao — chia hết tuỳ biến",
    ground:"<b>đề + test case</b> của challenge",
    gate:{cls:"paid",t:"Theo bài chứa nó"},
    sel:"trả về 'Fizz' nếu chia hết cho 3, 'Buzz' cho 5, 'FizzBuzz' cho cả hai",
    reply:"Bẫy hay gặp: kiểm tra <b>cả hai (15)</b> TRƯỚC khi kiểm 3 và 5 riêng, không thì 'FizzBuzz' không bao giờ ra. Không đưa lời giải — thử viết rồi chạy test case xem sao.",
  },
  foundation:{
    ic:"📚", cls:"foundation", cat:"Nền tảng", menu:"foundations",
    pk:"Đang hỏi về nền tảng", pv:"Foundation — Linux Permissions",
    crumb:"Thư viện nền tảng · Hệ điều hành", title:"Linux Permissions — chmod & chown",
    ground:"một tài liệu foundation (RAG một-tài-liệu)",
    gate:{cls:"open",t:"Thư viện chung — không cổng"},
    sel:"755 nghĩa là chủ đủ rwx, nhóm và người khác chỉ r-x",
    reply:"<code>755</code> đọc theo 3 nhóm: chủ = <b>7 (rwx)</b>, nhóm = <b>5 (r-x)</b>, người khác = <b>5 (r-x)</b>. Số = 4(r)+2(w)+1(x). Đây là thư viện chung nên ai cũng hỏi được.",
  },
  quiz:{
    ic:"❓", cls:"quiz", cat:"Quiz", menu:"quiz",
    pk:"Đang hỏi về quiz", pv:"Quiz — Câu 4: Volume vs Bind mount",
    crumb:"Bài 5 · Quiz ôn tập", title:"Câu 4 — Volume khác Bind mount ở đâu?",
    ground:"<b>câu hỏi + đáp án đúng</b> (chỉ sau khi nộp / khi ôn)",
    gate:{cls:"enr",t:"Chỉ khi ÔN (đang làm live thì ẩn chat)"},
    sel:"named volume do Docker quản lý, bind mount trỏ thẳng thư mục host",
    reply:"Khác cốt lõi: <b>named volume</b> nằm trong vùng Docker quản lý (bền, portable); <b>bind mount</b> trỏ thẳng một đường dẫn trên host (tiện dev, phụ thuộc máy). Giải thích này chỉ hiện khi bạn ĐANG ÔN, không phải lúc làm bài.",
  },
};
const COURSE={
  ic:"✦", cls:"course", cat:"Cả khóa", menu:"home",
  pk:"Đang hỏi về khóa", pv:"DevOps Mastery",
  crumb:"Khóa học", title:"DevOps Mastery",
  ground:"RAG <b>toàn khóa</b> — gom từ mọi bài đã học",
  gate:{cls:"enr",t:"Chỉ người đã ghi danh"},
  reply:"Khóa này đi từ Linux/Shell → Docker → Compose → Kubernetes → CI/CD. Bạn đang ở phần nền tảng; hỏi tiếp mình gợi ý bài nên mở.",
};
const CAT_ORDER=["content","milestone","challenges","foundation","quiz"];
const SELSUGGEST=["Giải thích đoạn này","Cho ví dụ cho đoạn này","Nói đơn giản hơn"];

const MENU=[
  ["home","🏠","Trang khóa"],
  ["content","📄","Bài B — Shell & Filesystem"],
  ["challenges","⚔️","Thử thách của bài B"],
  ["quiz","❓","Quiz ôn tập"],
  ["personal","🎓","Dự án cá nhân"],
  ["foundations","📚","Nền tảng (thư viện)"],
];

/* body content per surface */
function surfaceHTML(id){
  const c = id==="course"?COURSE:CATS[id];
  const chip=`<span class="catchip" style="background:var(--${c.cls}-soft);color:var(--${c.cls})">${c.ic} ${c.cat}</span>`;
  const crumb=`<div class="crumbs">${c.crumb} ${chip}</div>`;
  const hot = c.sel ? `<span class="hot" id="hot">${c.sel}</span>` : "";
  const cover=`<div class="live-cover">🔒 Đang làm bài đánh giá (live)<small style="color:inherit;opacity:.8">Khung chat AI bị ẩn để giữ trung thực. Xong bài sẽ mở lại — lúc ôn mới hỏi được.</small></div>`;
  if(id==="course") return crumb+`<h2>${c.title}</h2>
    <p>Không có nội dung nào đang mở — bạn đang ở trang khóa. Khung chat rơi về <b>hỏi cả khóa</b>: câu trả lời gom từ mọi bài đã học.</p>
    <p class="mut">Mở một bài / task / challenge / foundation / quiz ở menu trái để chat bám sát đúng phần đó.</p>`;
  if(id==="content") return crumb+`<h2>${c.title}</h2>${cover}
    <p class="selectable">Shell là cửa gõ lệnh; filesystem là cây thư mục. Điều hướng bằng ${hot} — <span class="mut">bôi đen câu trên để hỏi riêng đoạn.</span></p>
    <div class="codeblk">$ pwd            # bạn đang ở đâu
$ cd ../etc      # tương đối
$ cd /var/log    # tuyệt đối</div>
    <p class="mut">Bài premium → chat chỉ nhồi được thân bài khi đã ghi danh.</p>`;
  if(id==="challenges") return crumb+`<h2>${c.title}</h2>${cover}
    <p class="selectable">Viết hàm nhận n, in 1..n. Quy tắc: ${hot}.</p>
    <div class="codeblk">function fizzbuzz(n){ /* ... */ }
// test: fizzbuzz(15) -> "FizzBuzz"</div>
    <p class="mut">Bôi đen quy tắc để hỏi mà không bị đưa lời giải.</p>`;
  if(id==="foundation") return crumb+`<h2>${c.title}</h2>
    <p class="selectable">Quyền Linux gồm đọc/ghi/chạy cho chủ, nhóm, và mọi người. ${hot}.</p>
    <div class="codeblk">$ chmod 755 deploy.sh
$ chown starci:web deploy.sh</div>
    <p class="mut">Foundation là thư viện chung — ai cũng hỏi được, không cần ghi danh.</p>`;
  if(id==="milestone") return crumb+`<h2>${c.title}</h2>${cover}
    <p class="selectable">Đóng gói API thành image chạy mọi nơi. Tiêu chí: ${hot}.</p>
    <div class="codeblk">FROM node:20-alpine AS build
# ... COPY, npm ci, build</div>
    <p class="mut">Đề + tiêu chí chỉ cho người đã ghi danh — người ngoài không moi được qua AI.</p>`;
  if(id==="quiz") return crumb+`<h2>${c.title}</h2>${cover}
    <div class="qz"><b>Câu 4.</b> Volume khác Bind mount ở đâu?
      <div class="opt selectable">A. ${hot}</div>
      <div class="opt">B. Không có gì khác nhau</div>
    </div>
    <p class="mut">Sau khi nộp / khi ôn: bôi đen đáp án để hỏi sâu. Đang làm live → chat ẩn.</p>`;
  return crumb;
}

/* ---------- state ---------- */
let view="course";    // 'course' or a category id
let selecting=false;  // selection sub-page of a category
let live=false;
let histOpen=false;
const store={};       // key -> {msgs:[{role,text}], created}
const keyOf=(v,s)=> v==="course" ? "course" : (s? v+":sel" : v);

/* ---------- pager ---------- */
function buildPager(){
  const p=document.getElementById("pager");
  let html=`<span class="pg-lbl">Trang</span>
    <button class="pg-course" data-v="course" data-s="0">✦ Cả khóa</button>`;
  CAT_ORDER.forEach(id=>{
    const c=CATS[id];
    html+=`<span class="grp">
      <span class="g-ic" style="color:var(--${c.cls})">${c.ic}</span>
      <button class="pg" data-v="${id}" data-s="0">Hỏi</button>
      <span class="div"></span>
      <button class="pg sel" data-v="${id}" data-s="1">🔖 Đoạn</button>
    </span>`;
  });
  html+=`<span class="pgcount">11 trang · 5 category × 2 + cả khóa</span>`;
  p.innerHTML=html;
  p.querySelectorAll("[data-v]").forEach(b=>{
    b.onclick=()=>{ go(b.dataset.v, b.dataset.s==="1"); };
  });
}
function go(v,s){ view=v; selecting=(v!=="course")&&s; render(); }

/* ---------- interactions ---------- */
function ask(text){
  if(live) return;
  const k=keyOf(view,selecting);
  if(!store[k]) store[k]={msgs:[],created:Date.now()};
  const c = view==="course"?COURSE:CATS[view];
  store[k].msgs.push({role:"me",text});
  render(); scrollRail();
  store[k].typing=true; render(); scrollRail();
  setTimeout(()=>{
    store[k].typing=false;
    store[k].msgs.push({role:"ai",text:c.reply,g:(selecting?"🔖 đoạn · ":"")+c.pv});
    render(); scrollRail();
  }, 520);
}
function scrollRail(){ const b=document.getElementById("rbody"); if(b) b.scrollTop=b.scrollHeight; }

/* ---------- render ---------- */
function render(){
  document.body.classList.toggle("live", live);
  document.getElementById("livebtn").classList.toggle("on", live);

  /* pager active */
  document.querySelectorAll("#pager .pg,#pager .pg-course").forEach(b=>{
    const on = b.dataset.v===view && ((b.dataset.s==="1")===(!!selecting));
    b.classList.toggle("on", on);
  });

  /* menu */
  const menuActive = view==="course" ? "home" : CATS[view].menu;
  document.getElementById("menu").innerHTML =
    `<div class="mt">Khóa học</div>` +
    MENU.map(([mid,ic,label])=>{
      const on = mid===menuActive;
      const isLive = live && mid==="quiz";
      return `<button class="mi ${on?'on':''} ${isLive?'live':''}" data-m="${mid}"><span class="mic">${ic}</span>${label}${isLive?' · đang làm':''}</button>`;
    }).join("");
  document.querySelectorAll("#menu .mi").forEach(b=>{
    b.onclick=()=>{ const m=b.dataset.m; const cat=CAT_ORDER.find(id=>CATS[id].menu===m); go(cat||"course", false); };
  });

  /* surface */
  document.getElementById("surface").innerHTML = surfaceHTML(view);
  const hot=document.getElementById("hot");
  if(hot) hot.onclick=()=>{ selecting=true; render(); };

  /* rail */
  renderRail();
}

function renderRail(){
  const rail=document.getElementById("rail");
  const c = view==="course"?COURSE:CATS[view];
  if(live){
    rail.innerHTML=`<div class="rhead"><div class="pill" style="background:var(--amber-soft);border-color:var(--amber-line);color:var(--amber)"><span class="pic">🔒</span><span class="ptx"><span class="pk">Tạm ẩn</span><span class="pv">Đang làm bài đánh giá</span></span></div></div>
      <div class="railcover"><div class="lic">🔒</div><div>Khung chat ẩn khi đang làm quiz / phỏng vấn live.<br><small style="color:var(--muted)">Chống mở kênh nhắc bài. Tắt "Quiz live" để xem lại.</small></div></div>`;
    return;
  }
  const k=keyOf(view,selecting);
  const sess=store[k];
  const isSel=!!selecting;

  /* pill */
  const pk = isSel ? "Đang hỏi về đoạn đã chọn" : c.pk;
  const pv = isSel ? "“"+c.sel.slice(0,34)+(c.sel.length>34?"…":"")+"”" : c.pv;
  const pcls = isSel ? "selection" : c.cls;
  const head=`<div class="rhead">
    <div class="pill" style="background:var(--${pcls}-soft);border-color:var(--${pcls}-line);color:var(--${pcls})">
      <span class="pic">${isSel?"🔖":c.ic}</span>
      <span class="ptx"><span class="pk">${pk}</span><span class="pv">${pv}</span></span>
    </div>
    <button class="iconbtn ${histOpen?'on':''}" id="histbtn" title="Lịch sử">🕘</button>
    <button class="iconbtn" id="xbtn" title="${isSel?'Bỏ chọn đoạn':'Đóng'}">✕</button>
  </div>`;

  /* back-to-course bar: shown on any specific surface (not course, not selection view) */
  const back = (view!=="course" && !isSel)
    ? `<div class="backbar"><button class="backbtn" id="backbtn">← Hỏi cả khóa thay vì chỉ ${c.cat.toLowerCase()}</button></div>` : "";

  /* body */
  let body="";
  if(isSel){
    body += `<div class="quote"><span class="qm">❝</span><span class="qt">${c.sel}</span></div>`;
    body += `<div class="ground">Neo: kế thừa <b>${c.cat.toLowerCase()}</b> + chính đoạn bôi đen.</div>`;
    if(sess){
      body += `<div class="born">🔖 Phiên đoạn — sinh ra đã lưu trữ. Không nằm ở danh sách thường, nhưng search vẫn tìm ra.</div>`;
      body += renderMsgs(sess);
    } else {
      body += `<div class="asklist">`+SELSUGGEST.map(s=>`<button class="askbtn" onclick="ask('${s}')"><span class="as">✦</span>${s}</button>`).join("")+`</div>`;
    }
  } else {
    body += `<div class="ground">Neo grounding: ${c.ground}. <span class="gate" style="background:var(--${c.gate.cls==='paid'?'accent':c.gate.cls==='enr'?'ok':'info'}-soft);color:var(--${c.gate.cls==='paid'?'accent':c.gate.cls==='enr'?'ok':'info'})">${c.gate.t}</span></div>`;
    if(sess){ body += renderMsgs(sess); }
    else {
      body += `<div class="empty"><span class="eic">${c.ic}</span><div>Chưa có phiên ở đây.</div><small>Hỏi câu đầu để tạo phiên cho ${isSel?'đoạn':c.cat.toLowerCase()}.</small></div>`;
    }
  }

  /* foot */
  let foot="";
  if(isSel){
    foot=`<div class="composer"><input placeholder="Hỏi riêng đoạn này…" id="inp"><button class="send" id="sendbtn">➤</button></div>`;
  } else {
    foot=`<div class="chips"><span class="chip" onclick="ask('Tìm challenges liên quan')">🔎 Challenges liên quan</span><span class="chip" onclick="ask('Gợi ý flashcards')">🃏 Flashcards</span></div>
      <div class="composer"><input placeholder="Hỏi về ${c.pv}…" id="inp"><button class="send" id="sendbtn">➤</button></div>
      <div class="modelrow">Model <span class="mc">✦ Auto · ưu tiên local (free)</span></div>`;
  }

  rail.innerHTML = head + back + `<div class="rbody" id="rbody">${body}</div>` + `<div class="rfoot">${foot}</div>`;

  /* wire */
  const hb=document.getElementById("histbtn"); if(hb) hb.onclick=()=>{ histOpen=!histOpen; renderRail(); };
  const xb=document.getElementById("xbtn"); if(xb) xb.onclick=()=>{ if(isSel){selecting=false;render();} };
  const bb=document.getElementById("backbtn"); if(bb) bb.onclick=()=>{ go("course",false); };
  const send=document.getElementById("sendbtn"), inp=document.getElementById("inp");
  if(send&&inp){ send.onclick=()=>{ const v=inp.value.trim(); if(v) ask(v); inp.value=""; };
    inp.onkeydown=(e)=>{ if(e.key==="Enter"){ const v=inp.value.trim(); if(v) ask(v); inp.value=""; } }; }
  scrollRail();
}
function renderMsgs(sess){
  let h="";
  sess.msgs.forEach(m=> h += `<div class="msg ${m.role}">${m.text}${m.g?`<span class="g">grounded ↳ ${m.g}</span>`:""}</div>`);
  if(sess.typing) h+=`<div class="typing"><i></i><i></i><i></i></div>`;
  return h;
}

/* ---------- controls ---------- */
document.getElementById("livebtn").onclick=()=>{ live=!live; render(); };
document.getElementById("themebtn").onclick=()=>{
  const r=document.documentElement;
  const cur=r.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  r.setAttribute("data-theme", cur==="dark"?"light":"dark");
};

buildPager();
render();
</script>
</body>
</html>
