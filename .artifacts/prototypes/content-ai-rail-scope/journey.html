<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<title>Content-AI — hành trình khoá A → bài B → bôi đen</title>
<style>
  :root{
    --bg:#faf7f8;--surface:#fff;--border:#ece7e9;--sep:#f3eff0;--fg:#1c1a1b;--muted:#8b8386;
    --accent:#ec4899;--accent-soft:#fdf2f8;--warn:#b45309;--warn-soft:#fffbeb;--danger:#dc2626;--ok:#059669;
    --r:1.5rem;--r-sm:1rem;
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.55 system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--fg)}
  .wrap{max-width:1280px;margin:0 auto;padding:20px}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:var(--muted);margin:0 0 14px}

  /* timeline */
  .tl{display:flex;align-items:stretch;gap:0;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
  .step{flex:1;padding:11px 14px;cursor:pointer;border-right:1px solid var(--sep);position:relative}
  .step:last-child{border-right:0}
  .step .n{font-size:10.5px;color:var(--muted);letter-spacing:.04em}
  .step .t{font-size:13.5px;font-weight:600;margin-top:2px}
  .step .d{font-size:11.5px;color:var(--muted);margin-top:1px}
  .step.on{background:var(--accent-soft)}
  .step.on .t{color:#9d174d}

  .modebar{display:flex;gap:6px;margin-bottom:14px;align-items:center}
  .modebar button{border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:7px 14px;cursor:pointer;font:inherit;font-size:13px}
  .modebar button.on{background:var(--fg);color:#fff;border-color:var(--fg)}
  .modebar .lbl{font-size:12.5px;color:var(--muted);margin-right:4px}

  .stage{display:flex;gap:16px;align-items:flex-start}
  .app{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);height:600px;display:flex;flex-direction:column;overflow:hidden}
  .appbar{height:48px;border-bottom:1px solid var(--sep);display:flex;align-items:center;padding:0 14px;gap:8px;color:var(--muted);font-size:12.5px}
  .appbody{flex:1;padding:18px;overflow:auto}
  .ph{background:var(--sep);border-radius:9px;height:11px;margin:8px 0}
  .sel{background:#fde68a;border-radius:4px;padding:1px 3px}

  /* rail */
  .rail{width:392px;flex:0 0 392px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);height:600px;display:flex;flex-direction:column;overflow:hidden}
  .rhead{flex:0 0 auto;border-bottom:1px solid var(--sep);padding:10px 12px;display:flex;align-items:center;gap:8px}
  .scope{display:flex;align-items:center;gap:7px;min-width:0;flex:1;background:var(--accent-soft);border:1px solid #fbcfe8;border-radius:999px;padding:6px 11px}
  .scope.sel{background:#fffbeb;border-color:#fde68a}
  .scope .tx{min-width:0;flex:1}
  .scope .k{display:block;font-size:10.5px;color:var(--muted);line-height:1.2}
  .scope .v{display:block;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
  .iconbtn{width:29px;height:29px;flex:0 0 auto;border:1px solid var(--border);background:var(--surface);border-radius:9px;display:grid;place-items:center;font-size:12.5px;color:var(--muted)}
  .rbody{flex:1;min-height:0;overflow-y:auto;padding:12px}
  .rfoot{flex:0 0 auto;border-top:1px solid var(--sep);padding:10px 12px}
  .inp{border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 11px;color:var(--muted);font-size:13px;margin-bottom:7px}
  .frow{display:flex;align-items:center;gap:7px}
  .model{flex:1;font-size:12px;color:var(--muted)}
  .send{width:31px;height:31px;border-radius:999px;background:var(--accent);color:#fff;border:0;display:grid;place-items:center}

  .msg{border-radius:var(--r-sm);padding:9px 11px;margin-bottom:8px;font-size:13px;max-width:88%}
  .msg.me{background:var(--accent-soft);margin-left:auto}
  .msg.ai{background:var(--sep)}
  .quote{border-left:3px solid #f59e0b;background:#fffbeb;border-radius:0 8px 8px 0;padding:7px 10px;font-size:12.5px;color:#78350f;margin-bottom:8px}
  .mark{display:flex;align-items:center;gap:8px;margin:12px 0;color:var(--muted);font-size:11.5px}
  .mark::before,.mark::after{content:"";flex:1;height:1px;background:var(--sep)}
  .hint{color:var(--muted);font-size:13px;margin:2px 2px 10px}
  .chips{display:flex;flex-direction:column;gap:7px}
  .chip{display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 11px;font-size:13px}
  .chip.retr{border-style:dashed}
  .res{border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;margin-bottom:8px}
  .res h4{margin:0;padding:8px 11px;font-size:12px;color:var(--muted);font-weight:600;background:#fcfbfb;border-bottom:1px solid var(--sep)}
  .row{padding:9px 11px;border-bottom:1px solid var(--sep)}
  .row:last-child{border-bottom:0}
  .row.hot{background:#fdf2f8;box-shadow:inset 2px 0 0 var(--accent)}
  .row .t{font-size:13px;line-height:1.35}
  .row .m{font-size:11.5px;color:var(--muted);margin-top:2px}
  .gone{background:#fef2f2;border:1px dashed #fecaca;color:var(--danger);border-radius:var(--r-sm);padding:14px;text-align:center;font-size:12.5px}
  .gone b{display:block;font-size:13px;margin-bottom:3px}

  .cap{margin-top:12px;border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.6}
  .cap.now{background:#fef2f2;border:1px solid #fecaca;border-left:3px solid var(--danger)}
  .cap.next{background:#f0fdf4;border:1px solid #bbf7d0;border-left:3px solid var(--ok)}
  .cap b{display:block;margin-bottom:3px}
  code{background:var(--sep);padding:1px 5px;border-radius:5px;font-size:11.5px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Hành trình: vào khoá A → mở bài B → bôi đen một đoạn</h1>
  <p class="sub">Bấm từng mốc. Đổi giữa <b>Hiện tại</b> và <b>Đề xuất</b> để thấy khung chat biến đổi ra sao, và điều gì xảy ra với cuộc trò chuyện đang có.</p>

  <div class="tl" id="tl"></div>

  <div class="modebar">
    <span class="lbl">So sánh:</span>
    <button id="m-now" class="on">Hiện tại (code đang chạy)</button>
    <button id="m-next">Đề xuất</button>
  </div>

  <div class="stage">
    <div class="app">
      <div class="appbar"><b style="color:var(--fg)">StarCi</b> · <span id="route"></span></div>
      <div class="appbody" id="appbody"></div>
    </div>
    <div class="rail" id="rail"></div>
  </div>
  <div class="cap" id="cap"></div>
</div>

<script>
const STEPS = [
  { n:"MỐC 1", t:"Vào khoá A", d:"chưa mở bài nào · hỏi về cả khoá" },
  { n:"MỐC 2", t:"Mở bài B", d:"bấm một kết quả từ mốc 1" },
  { n:"MỐC 3", t:"Bôi đen một đoạn", d:"hỏi riêng đoạn vừa chọn" },
];

const APP = [
  `<div style="font-weight:600;margin-bottom:8px">DevOps Mastery — Playground</div>
   <div class="ph" style="width:92%"></div><div class="ph" style="width:78%"></div><div class="ph" style="width:88%"></div>`,
  `<div style="font-weight:600;margin-bottom:8px">Bài B — Shell &amp; Filesystem</div>
   <div class="ph" style="width:94%"></div><div class="ph" style="width:86%"></div><div class="ph" style="width:70%"></div><div class="ph" style="width:90%"></div>`,
  `<div style="font-weight:600;margin-bottom:8px">Bài B — Shell &amp; Filesystem</div>
   <div class="ph" style="width:94%"></div>
   <div style="margin:9px 0;font-size:13px;line-height:1.7">…đường dẫn <span class="sel">tuyệt đối bắt đầu từ <b>/</b>, còn tương đối tính từ thư mục hiện tại</span> nên khi script chạy ở chỗ khác thì…</div>
   <div class="ph" style="width:80%"></div>`,
];

const HEAD = {
  course: {cls:"", k:"Đang hỏi về khoá", v:"DevOps Mastery"},
  lesson: {cls:"", k:"Đang hỏi về bài", v:"Bài B — Shell & Filesystem"},
  sel:    {cls:"sel", k:"Đang hỏi về đoạn đã chọn", v:"“tuyệt đối bắt đầu từ / …”"},
};

const THREAD_1 = `
  <div class="msg me">Khoá này dạy Docker tới đâu?</div>
  <div class="msg ai">Khoá đi từ chạy container, build image, tới Compose và vận hành…</div>
  <div class="msg me">Tìm bài học trong khoá</div>
  <div class="res">
    <h4>Bài học trong khoá</h4>
    <div class="row hot"><div class="t">Bài B — Shell &amp; Filesystem</div><div class="m">Nền tảng Linux · bấm để mở →</div></div>
    <div class="row"><div class="t">Terraform nhập môn</div><div class="m">Terraform Fundamentals</div></div>
  </div>`;

const CHIPS = {
  course:`<div class="hint">Chưa mở bài nào. Hỏi bất cứ điều gì về cả khoá này.</div>
    <div class="chips">
      <div class="chip">🧭 Mình nên học gì tiếp?</div>
      <div class="chip retr">📚 Tìm bài học trong khoá</div>
      <div class="chip retr">🧩 Tìm thử thách trong khoá</div>
    </div>`,
  lesson:`<div class="hint">Hỏi bất cứ điều gì về bài này.</div>
    <div class="chips">
      <div class="chip">✧ Tóm tắt bài này trong 3 ý chính</div>
      <div class="chip">✧ Giải thích phần khó nhất</div>
      <div class="chip retr">🧩 Tìm thử thách của bài này</div>
    </div>`,
  sel:`<div class="hint">Hỏi về riêng đoạn bạn vừa bôi đen.</div>
    <div class="chips">
      <div class="chip">✧ Giải thích đoạn này</div>
      <div class="chip">✧ Cho ví dụ cho đoạn này</div>
      <div class="chip">✧ Nói đơn giản hơn</div>
    </div>`,
};

let step = 0, mode = "now";

const tl = document.getElementById('tl');
STEPS.forEach((s,i)=>{
  const d=document.createElement('div'); d.className='step'; d.dataset.i=i;
  d.innerHTML=`<div class="n">${s.n}</div><div class="t">${s.t}</div><div class="d">${s.d}</div>`;
  d.onclick=()=>{step=i;render()}; tl.appendChild(d);
});
document.getElementById('m-now').onclick=()=>{mode="now";render()};
document.getElementById('m-next').onclick=()=>{mode="next";render()};

function render(){
  [...tl.children].forEach((c,i)=>c.classList.toggle('on', i===step));
  document.getElementById('m-now').classList.toggle('on', mode==="now");
  document.getElementById('m-next').classList.toggle('on', mode==="next");
  document.getElementById('route').textContent =
    step===0 ? "/learn/playground/docker" : "/learn/content/modules/…/contents/bai-B";
  document.getElementById('appbody').innerHTML = APP[step];

  let head, body, cap;

  if (step===0){
    head = HEAD.course;
    body = THREAD_1;
    cap = {c:"next", h:"Mốc 1 — giống nhau ở cả hai bản",
      t:"Scope = khoá. Chip nói “trong khoá”, không nói “bài này”. Người học vừa hỏi và nhận được danh sách bài — <b>chính cuộc trò chuyện này dẫn họ tới bài B</b>."};
  }

  else if (step===1){
    head = HEAD.lesson;
    if (mode==="now"){
      body = `<div class="gone"><b>Thread biến mất</b>
        Mở bài B → <code>useEffect([contentId])</code> chạy <code>setMessages([])</code> + <code>setCurrentSessionId(null)</code>.
        Trước đó <code>onSelectSearchResult</code> còn gọi <code>closeChat()</code>, nên panel cũng đóng.</div>` + CHIPS.lesson;
      cap = {c:"now", h:"Mốc 2 — HIỆN TẠI: rơi mất cuộc trò chuyện",
        t:"Người học hỏi về khoá, được gợi ý bài B, bấm vào — và mất luôn đoạn chat vừa dẫn họ tới đó. Phải mở lại panel, rồi vào “Lịch sử trò chuyện” mới tìm lại được. Đây là <b>vách rơi ngay giữa hành trình mà chính chat tạo ra</b>."};
    } else {
      body = THREAD_1 + `
        <div class="mark">đã mở bài B · từ đây hỏi về bài này</div>
        <div class="msg ai">Bạn đang đọc <b>Bài B — Shell &amp; Filesystem</b>. Hỏi tiếp về bài này nhé.</div>` + CHIPS.lesson;
      cap = {c:"next", h:"Mốc 2 — ĐỀ XUẤT: giữ thread, chỉ đổi mốc",
        t:"Thread ở nguyên. Chèn một <b>mốc ngăn cách</b> ghi rõ grounding vừa đổi, pill header đổi theo, bộ chip đổi sang “của bài này”. Người học đọc lại được mạch: hỏi khoá → được gợi ý → mở bài → hỏi tiếp. Không mất gì, và vẫn trung thực về việc AI đang đọc cái khác."};
    }
  }

  else {
    head = HEAD.sel;
    const q = `<div class="quote">“tuyệt đối bắt đầu từ <b>/</b>, còn tương đối tính từ thư mục hiện tại”</div>`;
    if (mode==="now"){
      body = q + CHIPS.sel;
      cap = {c:"now", h:"Mốc 3 — HIỆN TẠI: đúng, nhưng vẫn trên nền thread đã mất",
        t:"Riêng lớp bôi đen thì đang chạy đúng — quote hiện lên, chip thu hẹp về 3 câu cho đoạn. Vấn đề là nền dưới nó đã trống từ mốc 2."};
    } else {
      body = THREAD_1 + `<div class="mark">đã mở bài B</div>` +
        `<div class="msg ai">Bạn đang đọc <b>Bài B</b>. Hỏi tiếp về bài này nhé.</div>` +
        `<div class="mark">đang hỏi về một đoạn</div>` + q + CHIPS.sel;
      cap = {c:"next", h:"Mốc 3 — ĐỀ XUẤT: lớp hẹp nhất chồng lên, không thay thế",
        t:"Bôi đen là lớp <b>hẹp nhất chồng lên</b>, không phải scope thứ tư thay thế bài. Quote nằm trong thread như một mốc; bỏ chọn thì về lại scope bài mà thread vẫn nguyên. Header đổi màu (hổ phách) để phân biệt ngay với hai scope kia."};
    }
  }

  document.getElementById('rail').innerHTML = `
    <div class="rhead">
      <div class="scope ${head.cls}"><span class="tx"><span class="k">${head.k}</span><span class="v">${head.v}</span></span></div>
      <div class="iconbtn">🕘</div><div class="iconbtn">▤</div><div class="iconbtn">✕</div>
    </div>
    <div class="rbody">${body}</div>
    <div class="rfoot"><div class="inp">Hỏi về nội dung này…</div>
      <div class="frow"><div class="model">✧ Tự động ▾</div><button class="send">➤</button></div></div>`;

  const c = document.getElementById('cap');
  c.className = 'cap ' + cap.c;
  c.innerHTML = `<b>${cap.h}</b>${cap.t}`;
}
render();
</script>
</body>
</html>
