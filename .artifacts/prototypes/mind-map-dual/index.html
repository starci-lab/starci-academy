<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mind-map-dual — 2 lộ trình song song (Học ⇄ Dự án)</title>
<style>
  :root{--border:#ece7ea;--fg:#1c1a1b;--muted:#8a8386;--accent:#d6006e;--accent-soft:#fbe6f1;--accent-soft-fg:#b8005e;--success:#16a34a;--gold:#eab308;--proj:#0ea5a0;--proj-soft:#d5f5f3}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#faf7f8;color:var(--fg);font:14px/1.4 system-ui,Segoe UI,Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  .bar{padding:10px 16px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border)}
  .bar b{font-size:14px}.bar .sp{margin-left:auto;color:var(--muted);font-size:12px}
  /* pill tabs (TabsCard primary) */
  .tabs{display:flex;gap:4px;background:#f1eaef;border-radius:999px;padding:4px;width:max-content;margin:14px auto 0}
  .tabs button{border:none;background:transparent;border-radius:999px;padding:9px 20px;font-size:14px;font-weight:700;cursor:pointer;color:var(--muted);display:flex;gap:7px;align-items:center}
  .tabs button.on{background:#fff;color:var(--fg);box-shadow:0 1px 4px rgba(0,0,0,.1)}
  .tabs button.on.proj{color:var(--proj)}

  .stage{position:relative;width:900px;height:600px;margin:12px auto;border-radius:24px;overflow:hidden;border:1px solid var(--border);transition:background .4s}
  .stage.learn{background:radial-gradient(700px 400px at 20% 100%,#fff4fa,transparent 60%),radial-gradient(700px 500px at 85% 0%,#eaf6ff,transparent 55%),linear-gradient(160deg,#f5eeff,#fff 70%)}
  .stage.proj{background:radial-gradient(700px 400px at 20% 100%,#e6fbf9,transparent 60%),radial-gradient(700px 500px at 85% 0%,#fff7db,transparent 55%),linear-gradient(160deg,#e9f7f6,#fff 70%);
    background-image:radial-gradient(700px 400px at 20% 100%,#e6fbf9,transparent 60%),linear-gradient(#eef7f6 1px,transparent 1px),linear-gradient(90deg,#eef7f6 1px,transparent 1px);background-size:auto,30px 30px,30px 30px}
  .viewport{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden}
  .track{position:relative;width:900px}
  svg.path{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

  .node{position:absolute;transform:translate(-50%,-50%);text-align:center;cursor:pointer;z-index:3;width:160px}
  .orb{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:27px;margin:0 auto;background:#fff;border:3px solid var(--border);box-shadow:0 5px 14px rgba(0,0,0,.08);position:relative}
  .lab{margin-top:6px;font-weight:700;font-size:12.5px;line-height:1.2}
  .sub{font-size:11px;color:var(--muted);margin-top:1px}
  .cbadge{position:absolute;top:-6px;right:-8px;background:#fff;border:1.5px solid var(--border);border-radius:999px;font-size:10px;font-weight:700;padding:1px 6px;color:var(--muted)}
  .done .orb{border-color:var(--success);background:linear-gradient(160deg,#eafaf0,#fff)}
  .done .orb::after{content:'✓';position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);width:20px;height:20px;border-radius:99px;background:var(--success);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;border:2px solid #fff}
  .cur.learn-c .orb{border-color:var(--accent);background:linear-gradient(160deg,var(--accent-soft),#fff)}
  .cur.proj-c .orb{border-color:var(--proj);background:linear-gradient(160deg,var(--proj-soft),#fff)}
  .cur .rz{position:absolute;inset:-6px;border-radius:50%;animation:pulse 1.8s infinite}
  .cur.learn-c .rz{border:3px solid var(--accent)}.cur.proj-c .rz{border:3px solid var(--proj)}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}70%{transform:scale(1.45);opacity:0}100%{opacity:0}}
  .todo .orb{filter:saturate(.5)}
  .lock .orb{opacity:.55}.lock .orb::after{content:'🔒';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);font-size:13px}
  .summit .orb{width:80px;height:80px;font-size:36px;border-color:var(--gold);background:linear-gradient(160deg,#fff7db,#fff);box-shadow:0 6px 24px rgba(234,179,8,.35)}

  .sat{position:absolute;transform:translate(-50%,-50%);z-index:2;border-radius:50%}
  .sat.dotL{width:16px;height:16px;background:#fff;border:2px solid var(--accent)}.sat.dotL.read{background:var(--accent)}
  .sat.dotP{width:16px;height:16px;background:#fff;border:2px solid var(--proj)}.sat.dotP.read{background:var(--proj)}
  .sat.quest{width:22px;height:22px;border-radius:6px;transform:translate(-50%,-50%) rotate(45deg);display:flex;align-items:center;justify-content:center;font-size:9px}
  .sat.quest span{transform:rotate(-45deg)}
  .q-done{background:var(--success);color:#fff}.q-prog{background:var(--gold);color:#fff}.q-todo{background:#fff;border:2px solid var(--border)}

  .me{position:absolute;transform:translate(-50%,-120%);z-index:6;text-align:center}
  .me .av{width:40px;height:40px;border-radius:50%;border:3px solid #fff;box-shadow:0 5px 14px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:19px;margin:0 auto}
  .me.learn-c .av{background:#2b6cb0}.me.proj-c .av{background:var(--proj)}
  .me .flag{margin-top:4px;color:#fff;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:999px;white-space:nowrap}
  .me.learn-c .flag{background:var(--accent)}.me.proj-c .flag{background:var(--proj)}

  .hud{position:absolute;top:14px;right:14px;z-index:9;background:rgba(255,255,255,.82);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:16px;padding:9px 13px;display:flex;gap:13px;align-items:center;box-shadow:0 8px 22px rgba(0,0,0,.08)}
  .hud .st{font-size:11px;color:var(--muted)}.hud .st b{display:block;font-size:15px;color:var(--fg)}
  .jump{position:absolute;top:14px;left:14px;z-index:9;color:#fff;border:none;border-radius:12px;padding:8px 14px;font-weight:800;font-size:12.5px;cursor:pointer}
  .jump.learn-c{background:var(--accent);box-shadow:0 6px 18px rgba(214,0,110,.4)}
  .jump.proj-c{background:var(--proj);box-shadow:0 6px 18px rgba(14,165,160,.4)}
  .note{max-width:900px;margin:0 auto 40px;padding:0 16px;font-size:12.5px;color:var(--muted)}
  .note b{color:var(--fg)}.note code{background:#f4eef1;padding:1px 5px;border-radius:5px;font-size:11px}
</style>
</head>
<body>
  <div class="bar"><b>2 lộ trình song song</b> <span style="color:var(--muted);font-size:12px">— tab qua lại: đường HỌC (module) ⇄ đường DỰ ÁN (capstone). Mỗi cái 1 serpentine riêng.</span></div>

  <div class="tabs">
    <button id="tLearn" class="on">📚 Lộ trình học</button>
    <button id="tProj" class="proj">🏗️ Dự án Capstone</button>
  </div>

  <div class="stage learn" id="stage">
    <div class="viewport" id="vp"><div class="track" id="track"><svg class="path" id="svg"></svg></div></div>
    <button class="jump learn-c" id="jump">↧ Vị trí của tôi</button>
    <div class="hud" id="hud"></div>
  </div>

  <div class="note" id="note"></div>

<script>
  var LEARN={
    kind:'learn', cls:'learn-c', dy:140, cur:6,
    hud:'<div class="st">Hoàn thành<b>28%</b></div><div class="st">Chuỗi<b>🔥 7</b></div><div class="st">XP<b>640</b></div>',
    summit:{ic:'🏆',lab:'Tốt nghiệp khóa',sub:'20/20 module'},
    items:[['Nền tảng backend','🧱'],['DB & Caching','🗄️'],['REST API','🔌'],['Xác thực','🔐'],['Testing & CI','🧪'],['Message Queue','📨'],['Caching nâng cao','⚡'],['Observability','📈'],['Docker hoá','🐳'],['Kubernetes','☸️'],['Microservices','🧩'],['gRPC','🔗'],['Event-driven','📡'],['Search','🔎'],['Bảo mật','🛡️'],['Performance','🚀'],['Scaling','📊'],['Data pipeline','🔀'],['Cloud deploy','☁️'],['System design','🏛️']],
    childLabel:'bài', childIcon:'⚔️'
  };
  var PROJ={
    kind:'proj', cls:'proj-c', dy:170, cur:2,
    hud:'<div class="st">Task xong<b>3/8</b></div><div class="st">Điểm TB<b>82</b></div><div class="st">Chặng<b>2/5</b></div>',
    summit:{ic:'🚀',lab:'Nộp & Demo',sub:'chấm điểm cuối'},
    items:[['Chặng 1: Thiết kế schema','📐'],['Chặng 2: Xây API layer','🏗️'],['Chặng 3: Auth & bảo mật','🔐'],['Chặng 4: Caching & queue','⚡'],['Chặng 5: Deploy & CI/CD','☁️']],
    childLabel:'task', childIcon:'▪'
  };

  var track=document.getElementById('track'), svg=document.getElementById('svg'), vp=document.getElementById('vp'),
      stage=document.getElementById('stage'), hud=document.getElementById('hud'), jump=document.getElementById('jump');
  var W=900, topPad=110, botPad=90, cfg=LEARN, expand=true;

  function mx(i){return W/2 + 205*Math.sin(i*0.85);}
  function trackH(){return topPad+cfg.items.length*cfg.dy+botPad;}
  function my(i){return trackH() - botPad - (i-1)*cfg.dy;}

  function render(){
    var N=cfg.items.length, CUR=cfg.cur, accent=cfg.kind==='learn'?'#d6006e':'#0ea5a0', accent2=cfg.kind==='learn'?'#ff7ab8':'#5fd6d0';
    track.style.height=trackH()+'px'; svg.setAttribute('viewBox','0 0 '+W+' '+trackH());
    // path
    var pdC='',pdA='';
    for(var i=1;i<N;i++){var x1=mx(i),y1=my(i),x2=mx(i+1),y2=my(i+1),m=(y1+y2)/2;
      var seg='M'+x1+','+y1+' C'+x1+','+m+' '+x2+','+m+' '+x2+','+y2+' ';(i+1<=CUR?pdC+=seg:pdA+=seg);}
    var cx=W/2, cy=my(N)-95;
    svg.innerHTML='<defs><linearGradient id="g" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="'+accent+'"/><stop offset="1" stop-color="'+accent2+'"/></linearGradient>'
      +'<filter id="gl"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>'
      +'<path d="'+pdA+'" fill="none" stroke="#e4dde1" stroke-width="10" stroke-linecap="round" stroke-dasharray="2 16"/>'
      +'<path d="'+pdC+'" fill="none" stroke="url(#g)" stroke-width="10" stroke-linecap="round" filter="url(#gl)"/>'
      +'<path d="M'+mx(N)+','+my(N)+' L'+cx+','+cy+'" stroke="#e4dde1" stroke-width="10" stroke-dasharray="2 16" stroke-linecap="round"/>';
    track.querySelectorAll('.node,.me,.sat').forEach(function(n){n.remove()});
    for(var i=1;i<=N;i++){
      var st=i<CUR?'done':i===CUR?'cur':i===CUR+1?'todo':'lock';
      var lt=cfg.kind==='learn'?(i<=4?4:5):(2+(i%2)), ld=i<CUR?lt:i===CUR?1:0;
      var el=document.createElement('div'); el.className='node '+st+' '+cfg.cls;
      el.style.left=mx(i)+'px'; el.style.top=my(i)+'px';
      el.innerHTML='<div class="orb">'+(st==='cur'?'<div class="rz"></div>':'')+cfg.items[i-1][1]
        +'<span class="cbadge">'+ld+'/'+lt+' '+cfg.childLabel+'</span></div>'
        +'<div class="lab">'+(cfg.kind==='learn'?i+'. ':'')+cfg.items[i-1][0]+'</div>'
        +'<div class="sub">'+(st==='done'?'xong ✓':st==='cur'?'Đang ở đây':st==='lock'?'🔒 khóa':'sắp tới')+'</div>';
      track.appendChild(el);
      if(expand && i===CUR){var cxp=mx(i),cyp=my(i);
        for(var L=0;L<lt;L++){var a=-1.1+L*0.5;var s=document.createElement('div');
          s.className='sat '+(cfg.kind==='learn'?'dotL':'dotP')+(L<ld?' read':'');
          s.style.left=(cxp+70*Math.cos(a))+'px';s.style.top=(cyp+70*Math.sin(a))+'px';track.appendChild(s);}
        if(cfg.kind==='learn'){for(var C=0;C<3;C++){var a2=1.5+C*0.45;var q=document.createElement('div');
          q.className='sat quest '+(C===0?'q-prog':'q-todo');q.style.left=(cxp+84*Math.cos(a2))+'px';q.style.top=(cyp+84*Math.sin(a2))+'px';q.innerHTML='<span>⚔️</span>';track.appendChild(q);}}
      }
    }
    var cap=document.createElement('div'); cap.className='node summit'; cap.style.left=cx+'px'; cap.style.top=cy+'px';
    cap.innerHTML='<div class="orb">'+cfg.summit.ic+'</div><div class="lab">'+cfg.summit.lab+'</div><div class="sub">'+cfg.summit.sub+'</div>';
    track.appendChild(cap);
    var me=document.createElement('div'); me.className='me '+cfg.cls; me.style.left=mx(CUR)+'px'; me.style.top=my(CUR)+'px';
    me.innerHTML='<div class="av">🧑‍💻</div><div class="flag">Bạn đang ở đây</div>';
    track.appendChild(me);
    hud.innerHTML=cfg.hud;
    setTimeout(function(){vp.scrollTop=my(CUR)-vp.clientHeight/2;},20);
  }

  function setTab(c){
    cfg=c;
    stage.className='stage '+(c.kind==='learn'?'learn':'proj');
    jump.className='jump '+c.cls;
    document.getElementById('tLearn').classList.toggle('on',c.kind==='learn');
    document.getElementById('tProj').classList.toggle('on',c.kind==='proj');
    render();
  }
  document.getElementById('tLearn').onclick=function(){setTab(LEARN)};
  document.getElementById('tProj').onclick=function(){setTab(PROJ)};
  jump.onclick=function(){vp.scrollTo({top:my(cfg.cur)-vp.clientHeight/2,behavior:'smooth'})};
  setTab(LEARN);

  document.getElementById('note').innerHTML='<b>2 lộ trình SONG SONG, tab qua lại</b> (giống tab Tuần/Toàn-cầu ở /league). '
    +'<b>📚 Học</b> = serpentine 20 module → lesson + challenge, đỉnh = 🏆 Tốt nghiệp. '
    +'<b>🏗️ Dự án</b> = serpentine riêng của Capstone: mỗi <b>chặng (milestone)</b> là 1 waypoint → task nở ra, đỉnh = 🚀 Nộp & Demo. '
    +'Tông màu đổi theo tab (hồng học / xanh-ngọc dự án) + nền đổi (dự án có lưới blueprint) để 2 "thế giới" tách bạch. '
    +'Data khớp 0-BE: <code>myCourseOutline.modules[]</code> nuôi tab Học, <code>myCourseOutline.milestones[]→tasks[]</code> nuôi tab Dự án — 2 mảng RIÊNG, không phải nhồi capstone vào cuối đường học.';
</script>
</body>
</html>
