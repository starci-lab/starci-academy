<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mind-map-stepper — roadmap dọc bằng block Stepper (robust)</title>
<style>
  :root{--bg:#faf7f8;--surface:#fff;--surface-2:#f4eef1;--border:#ece7ea;--fg:#1c1a1b;--muted:#8a8386;--accent:#d6006e;--accent-soft:#fbe6f1;--accent-soft-fg:#b8005e;--success:#16a34a;--default:#dcd7da;--gold:#eab308}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font:14px/1.45 system-ui,Segoe UI,Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  .bar{padding:10px 16px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border)}
  .bar b{font-size:14px}.bar .sp{margin-left:auto;color:var(--muted);font-size:12px}
  .wrap{max-width:640px;margin:0 auto;padding:20px 16px 80px}
  /* header */
  .head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
  .head .n{font-size:20px;font-weight:800}
  .head .k{font-size:12px;color:var(--muted)}
  .pct{text-align:right}.pct b{font-size:20px;font-weight:800}.pct .k{font-size:11px}
  .meter{height:8px;border-radius:999px;background:var(--surface-2);overflow:hidden;margin-bottom:18px}
  .meter i{display:block;height:100%;background:var(--accent);border-radius:999px}
  .tabs{display:flex;gap:4px;background:var(--surface-2);border-radius:999px;padding:4px;width:max-content;margin-bottom:22px}
  .tabs button{border:none;background:transparent;border-radius:999px;padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer;color:var(--muted)}
  .tabs button.on{background:var(--surface);color:var(--fg);box-shadow:0 1px 3px rgba(0,0,0,.1)}
  .cta{width:100%;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:13px;font-weight:800;font-size:15px;cursor:pointer;display:flex;gap:8px;align-items:center;justify-content:center;margin-bottom:22px}
  /* stepper (mimic block Stepper vertical) */
  .step{display:flex;gap:12px}
  .rail{display:flex;flex-direction:column;align-items:center}
  .ind{width:32px;height:32px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex:none}
  .ind.done{background:var(--success);color:#fff}
  .ind.cur{background:var(--accent);color:#fff;box-shadow:0 0 0 2px #fff,0 0 0 4px var(--accent)}
  .ind.up{border:2px solid var(--default);color:var(--default);background:transparent}
  .conn{width:2px;flex:1;margin:4px 0;min-height:26px}
  .conn.passed{background:var(--success)}.conn.rest{background:var(--default)}
  .body{padding-top:4px;padding-bottom:18px;cursor:pointer;flex:1}
  .lab{font-size:14px;font-weight:600}
  .lab.cur{font-weight:700}.lab.up{color:var(--muted);font-weight:400}
  .desc{font-size:12px;color:var(--muted);margin-top:2px}
  /* current module expands its lessons as a nested SurfaceListCard */
  .expand{margin-top:10px;border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--surface)}
  .lrow{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer}
  .lrow:last-child{border-bottom:none}
  .lrow .rk{width:18px;text-align:center;font-size:12px;color:var(--muted)}
  .lrow .dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--accent);flex:none}.lrow .dot.read{background:var(--accent)}
  .lrow .q{margin-left:auto;font-size:11px;color:var(--muted)}
  .lock{font-size:12px;color:var(--muted);margin-left:6px}
  .note{max-width:640px;margin:0 auto 40px;padding:0 16px;font-size:12.5px;color:var(--muted)}
  .note b{color:var(--fg)}.note code{background:#f4eef1;padding:1px 5px;border-radius:5px;font-size:11px}
</style>
</head>
<body>
  <div class="bar"><b>Mind-map = roadmap DỌC (block Stepper)</b> <span class="sp">robust flex, không absolute-position; tái dùng Storybook</span></div>

  <div class="wrap">
    <div class="head">
      <div><div class="k">Lộ trình của bạn</div><div class="n">Fullstack Mastery</div></div>
      <div class="pct"><b id="pct">28%</b><div class="k">hoàn thành</div></div>
    </div>
    <div class="meter"><i id="meter" style="width:28%"></i></div>

    <div class="tabs">
      <button id="tL" class="on">📚 Lộ trình học</button>
      <button id="tP">🏗️ Dự án</button>
    </div>

    <button class="cta" id="cta">Tiếp tục học →</button>

    <div id="road"></div>
  </div>

  <div class="note" id="note"></div>

<script>
  var LEARN={cur:2, pct:28, cta:'Tiếp tục học →',
    items:[
      {ic:'🧱',t:'1. Nền tảng backend',d:'5/5 bài · ⚔️3/3'},
      {ic:'🗄️',t:'2. Tích hợp DB & Caching',d:'2/4 bài · ⚔️1/3',
        lessons:[{n:'2.1 Kết nối DB',read:1},{n:'2.2 Migrations',read:0},{n:'2.3 Caching layer',read:0,lock:0},{n:'2.4 Query optimization',read:0,lock:1}]},
      {ic:'🔌',t:'3. REST API: Thiết kế & Tài liệu',d:'1/4 bài · ⚔️0/3'},
      {ic:'🔐',t:'4. Xác thực & Phân quyền',d:'0/4 bài'},
      {ic:'🧪',t:'5. Testing & CI',d:'0/3 bài'},
      {ic:'🐳',t:'6. Docker hoá',d:'0/4 bài'},
      {ic:'☸️',t:'7. Kubernetes',d:'0/5 bài'},
      {ic:'🏛️',t:'…20. System design',d:'0/4 bài'},
    ]};
  var PROJ={cur:1, pct:37, cta:'Tiếp tục dự án →',
    items:[
      {ic:'📐',t:'Chặng 1: Thiết kế schema',d:'2/2 task'},
      {ic:'🏗️',t:'Chặng 2: Xây API layer',d:'1/3 task',
        lessons:[{n:'Task: REST endpoints',read:1},{n:'Task: Validation',read:0},{n:'Task: Error handling',read:0}]},
      {ic:'🔐',t:'Chặng 3: Auth & bảo mật',d:'0/2 task'},
      {ic:'☁️',t:'Chặng 4: Deploy & CI/CD',d:'0/3 task'},
    ]};

  var cfg=LEARN;
  function render(){
    var road=document.getElementById('road'); road.innerHTML='';
    cfg.items.forEach(function(it,i){
      var st = i<cfg.cur?'done':i===cfg.cur?'cur':'up';
      var last=i===cfg.items.length-1;
      var step=document.createElement('div'); step.className='step';
      var expand='';
      if(st==='cur' && it.lessons){
        expand='<div class="expand">'+it.lessons.map(function(l){
          return '<div class="lrow"><span class="rk">'+(it.lessons.indexOf(l)+1)+'</span><span class="dot'+(l.read?' read':'')+'"></span>'
            +l.n+(l.lock?'<span class="lock">🔒</span>':'')+'</div>';
        }).join('')+'</div>';
      }
      step.innerHTML='<div class="rail"><span class="ind '+st+'">'+(st==='done'?'✓':i+1)+'</span>'
        +(last?'':'<span class="conn '+(i<cfg.cur?'passed':'rest')+'"></span>')+'</div>'
        +'<div class="body"><div class="lab '+st+'">'+it.ic+' '+it.t+'</div><div class="desc">'+it.d+'</div>'+expand+'</div>';
      road.appendChild(step);
    });
    document.getElementById('pct').textContent=cfg.pct+'%';
    document.getElementById('meter').style.width=cfg.pct+'%';
    document.getElementById('cta').textContent=cfg.cta;
  }
  function tab(c){cfg=c;document.getElementById('tL').classList.toggle('on',c===LEARN);document.getElementById('tP').classList.toggle('on',c===PROJ);render();}
  document.getElementById('tL').onclick=function(){tab(LEARN)};
  document.getElementById('tP').onclick=function(){tab(PROJ)};
  render();

  document.getElementById('note').innerHTML='<b>Dùng block <code>Stepper</code> (orientation="vertical") làm xương sống.</b> '
    +'Mỗi module/chặng = 1 step: indicator tròn (✓ done=success · số current=accent-ring · số upcoming=outline) + connector dọc chuyển success dần + label (emoji+tiêu đề) + description (progress "2/4 bài · ⚔️1/3"). '
    +'<b>Robust</b>: flex column co giãn theo container, KHÔNG absolute-position → không vỡ như serpentine. '
    +'Module HIỆN TẠI nở nhẹ danh sách bài (nested <code>SurfaceListCard</code>). Header = progress meter + tabs 📚/🏗️ + CTA "Tiếp tục" (canonical Button). '
    +'2 lộ trình song song vẫn giữ (tab qua lại). Data y nguyên từ <code>journey.ts</code> đã build (waypoints→steps, currentIndex, href). '
    +'Đánh đổi: bớt "wow" serpentine, được ĐỘ BỀN + tái dùng Storybook (thầy chọn).';
</script>
</body>
</html>
