<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Playground ConnectSheet — connected: latency + device config + agent log</title>
<style>
  :root{--bg:#faf7f5;--surface:#fff;--surface2:#f6f2ef;--border:#e7e0db;--fg:#241c1a;--muted:#8a7d76;
    --accent:#ec4899;--accent-soft:#fce7f3;--accent-soft-fg:#9d1f5f;
    --success-soft:#e3f5ee;--success-fg:#136b4f;--warn-soft:#fbf0dd;--warn-fg:#8a5510;--danger-soft:#fde8e8;--danger-fg:#a12525;}
  *{box-sizing:border-box} body{margin:0;font-family:ui-sans-serif,system-ui,"Segoe UI",sans-serif;background:var(--bg);color:var(--fg)}
  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  .top{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);background:var(--surface);z-index:40}
  .top b{font-size:14px}.top .muted{color:var(--muted);font-size:12px}
  .seg{margin-left:auto;display:inline-flex;border:1px solid var(--border);border-radius:999px;overflow:hidden;flex-wrap:wrap}
  .seg button{border:0;background:transparent;padding:6px 11px;font-size:12px;cursor:pointer;color:var(--muted)}
  .seg button.on{background:var(--accent-soft);color:var(--accent-soft-fg);font-weight:600}
  .stagewrap{flex:1;position:relative;overflow:hidden}
  .frame{height:100%;display:grid;grid-template-columns:1fr 1fr}
  .stage.mobile .frame{max-width:420px;margin:0 auto;grid-template-columns:1fr}
  .pane{overflow:auto;padding:20px 22px 90px}.left{border-right:1px solid var(--border);background:var(--bg)}
  .right{background:var(--surface);padding:0}
  .stage.mobile .right{display:none}
  h6{margin:0 0 8px;font-size:15px;font-weight:700}.muted{color:var(--muted)}.xs{font-size:11px}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;width:fit-content}
  .c-ok{background:var(--success-soft);color:var(--success-fg)}
  .dot{width:7px;height:7px;border-radius:999px;background:currentColor}
  .lat{font-weight:700}.lat.good{color:var(--success-fg)}.lat.mid{color:var(--warn-fg)}.lat.bad{color:var(--danger-fg)}
  .btn{border:0;border-radius:999px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;background:var(--surface2);color:var(--fg)}
  .tag{display:inline-block;font-size:10px;border:1px dashed var(--accent);color:var(--accent-soft-fg);border-radius:6px;padding:1px 5px;margin-left:6px;vertical-align:middle}
  /* device grid = StatGridCard (grid stat item icon+value+label) */
  .devgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:4px 0 14px}
  .stage.mobile .devgrid{grid-template-columns:repeat(2,1fr)}
  .dev{border-radius:16px;background:var(--surface2);padding:10px 12px;display:flex;flex-direction:column;gap:2px}
  .dev .ic{font-size:16px;color:var(--muted)}
  .dev .val{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dev .lbl{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .dev .sub{font-size:10.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* agent log = mono scroll (compact terminal-ish) */
  .logwrap{border-radius:16px;background:#1e1a19;overflow:hidden;margin-bottom:12px}
  .logwrap .lh{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid #ffffff14}
  .logwrap .lh span{font-size:11px;color:#c9c1bd;font-weight:600}
  .logwrap .lh .cp{color:#8a7d76;cursor:pointer;font-size:12px}
  .log{max-height:150px;overflow:auto;padding:10px 12px;font-family:ui-monospace,monospace;font-size:11.5px;line-height:1.6;color:#cfe6d8}
  .log .t{color:#6b7a72;margin-right:6px}.log .warn{color:#e0b877}.log .err{color:#e58a8a}
  /* sheet */
  .sheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border:1px solid var(--border);border-top-left-radius:24px;border-top-right-radius:24px;z-index:30;display:flex;flex-direction:column;max-height:72vh}
  .grab{display:flex;justify-content:center;padding:8px 0 2px}.grab .bar{width:38px;height:5px;border-radius:999px;background:var(--border)}
  .peek{display:flex;align-items:center;gap:10px;padding:4px 18px 12px;flex-wrap:wrap}
  .peek .btn{margin-left:auto}
  .sbody{overflow:auto;padding:2px 18px 20px}
  .note{padding:9px 16px;background:var(--surface2);border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
  .empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:8px}
  .constabs{display:flex;padding:0 16px;border-bottom:1px solid var(--border)}
  .constabs .t{font-size:13px;padding:12px 14px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer}
  .constabs .t.on{color:var(--accent-soft-fg);font-weight:600;border-bottom-color:var(--accent)}
  .console{background:#1e1a19;color:#dfe7dd;font-family:ui-monospace,monospace;font-size:12px;padding:16px;min-height:180px}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <b>ConnectSheet · connected — latency + device + agent log</b>
    <span class="muted">device data từ AGENT (plain Node os+gpu), Nest relay</span>
    <div class="seg" id="seg">
      <button data-s="full" class="on">Đủ info</button>
      <button data-s="nogpu">GPU N/A</button>
      <button data-dev="m">Mobile</button>
    </div>
  </div>
  <div class="stagewrap">
    <div class="stage" id="stage">
      <div class="frame">
        <div class="pane left" id="left"></div>
        <div class="pane right" id="right"></div>
      </div>
      <div class="sheet" id="sheet">
        <div class="grab"><div class="bar"></div></div>
        <div class="peek" id="peek"></div>
        <div class="sbody" id="sbody"></div>
      </div>
    </div>
  </div>
  <div class="note" id="note"></div>
</div>
<script>
let gpu=true;
const latClass=(ms)=> ms<55?'good':ms<120?'mid':'bad';
function render(){
  const L=document.getElementById('left'),R=document.getElementById('right'),P=document.getElementById('peek'),B=document.getElementById('sbody');
  L.innerHTML=`<div class="xs muted" style="margin-bottom:8px">● ● ○ ○ ○  Bước 6/20</div><h6>Build image từ Dockerfile</h6>
    <div class="muted" style="font-size:13px;margin-bottom:12px">Build một image từ Dockerfile, gắn tag v1.</div>
    <div style="border-radius:24px;background:#fff;box-shadow:0 6px 20px -8px rgba(60,40,30,.18);padding:12px 14px;font-family:ui-monospace,monospace;font-size:12.5px;color:#b45309">docker build -t starci-demo:v1 .</div>
    <div style="margin-top:14px"><button class="btn" style="background:var(--accent);color:#fff">Xác nhận đã xong bước này</button></div>`;
  R.innerHTML=`<div class="constabs"><span class="t on">Terminal</span><span class="t">Tài nguyên (48)</span><span class="tag" style="margin-left:auto">ExtendedTabs</span></div><div class="console">$ docker build -t starci-demo:v1 .<br>Successfully tagged starci-demo:v1</div>`;

  // ── PEEK: status + LIVE latency badge + reconnect ──
  P.innerHTML=`<span class="chip c-ok"><span class="dot"></span>Máy đã kết nối · <span class="lat good" id="ping">42 ms</span></span>
    <span class="tag">StatusChip + latency ping 5s</span>
    <button class="btn">Kết nối lại / đổi máy</button>`;

  // ── BODY: device config + agent log ──
  const gpuTile = gpu
    ? `<div class="dev"><div class="ic">▤</div><div class="val">RTX 5060</div><div class="lbl">GPU</div><div class="sub">NVIDIA · 8 GB</div></div>`
    : `<div class="dev"><div class="ic">▤</div><div class="val muted">—</div><div class="lbl">GPU</div><div class="sub">không đọc được</div></div>`;
  B.innerHTML=`
    <div class="xs muted" style="margin:2px 0 6px;text-transform:uppercase;letter-spacing:.04em">Máy của bạn <span class="tag">StatGridCard / IconTile+value</span></div>
    <div class="devgrid">
      <div class="dev"><div class="ic">▣</div><div class="val">Windows 11</div><div class="lbl">Hệ điều hành</div><div class="sub">x64 · DESKTOP-HI</div></div>
      <div class="dev"><div class="ic">◧</div><div class="val">8 nhân</div><div class="lbl">CPU</div><div class="sub">Ryzen 7 5800X</div></div>
      <div class="dev"><div class="ic">▦</div><div class="val">16 GB</div><div class="lbl">RAM</div><div class="sub">9.2 GB trống</div></div>
      ${gpuTile}
    </div>
    <div class="logwrap">
      <div class="lh"><span>Nhật ký agent <span class="tag" style="border-color:#8a7d76;color:#c9c1bd">agent:log stream · Nest relay</span></span><span class="cp">⧉</span></div>
      <div class="log" id="log">
        <div><span class="t">08:12:58</span>connecting to wss://academy-local.starci.org/playground_byom …</div>
        <div><span class="t">08:12:59</span>paired ✓  playground=docker  step=6</div>
        <div><span class="t">08:12:59</span>device: Windows 11 x64 · Ryzen 7 5800X (8) · 16GB · RTX 5060</div>
        <div><span class="t">08:12:59</span>ready — run the steps in your terminal; relaying output + verifying resources.</div>
        <div><span class="t">08:13:20</span>$ docker build -t starci-demo:v1 .</div>
        <div><span class="t">08:13:41</span>Successfully tagged starci-demo:v1</div>
      </div>
    </div>
    <div class="xs muted">Kéo lên xem chi tiết máy + log · đổi máy: bấm "Kết nối lại".</div>`;
  document.getElementById('note').innerHTML=`[connected] peek: status + latency(ping 5s) + reconnect · body: <b>device tiles (OS/CPU/RAM/GPU)</b> + <b>agent-log stream</b> · GPU best-effort (${gpu?'đọc được':'N/A'})`;
}
document.getElementById('seg').onclick=e=>{ if(e.target.dataset.s){gpu=e.target.dataset.s==='full';[...document.querySelectorAll('#seg [data-s]')].forEach(b=>b.classList.toggle('on',b.dataset.s===e.target.dataset.s));render();} if(e.target.dataset.dev){document.getElementById('stage').classList.toggle('mobile');e.target.classList.toggle('on');} };
// live ping tick
setInterval(()=>{const el=document.getElementById('ping');if(el){const ms=28+Math.floor(Math.random()*130);el.textContent=ms+' ms';el.className='lat '+latClass(ms);}},2000);
render();
</script>
</body>
</html>
