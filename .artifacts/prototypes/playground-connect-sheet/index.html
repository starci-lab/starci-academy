<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Playground Connect Sheet — draggable bottom-sheet per state</title>
<style>
  :root{--bg:#faf7f5;--surface:#fff;--surface2:#f6f2ef;--border:#e7e0db;--fg:#241c1a;--muted:#8a7d76;
    --accent:#ec4899;--accent-soft:#fce7f3;--accent-soft-fg:#9d1f5f;
    --success-soft:#e3f5ee;--success-fg:#136b4f;--warn-soft:#fbf0dd;--warn-fg:#8a5510;--info-soft:#e6f0fb;--info-fg:#1f5b96;
    --shadow:0 6px 20px -6px rgba(60,40,30,.18),0 2px 6px -2px rgba(60,40,30,.10);}
  *{box-sizing:border-box} body{margin:0;font-family:ui-sans-serif,system-ui,"Segoe UI",sans-serif;background:var(--bg);color:var(--fg)}
  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  .top{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);background:var(--surface);z-index:40}
  .top b{font-size:14px}.top .muted{color:var(--muted);font-size:12px}
  .seg{margin-left:auto;display:inline-flex;border:1px solid var(--border);border-radius:999px;overflow:hidden;flex-wrap:wrap}
  .seg button{border:0;background:transparent;padding:6px 11px;font-size:12px;cursor:pointer;color:var(--muted)}
  .seg button.on{background:var(--accent-soft);color:var(--accent-soft-fg);font-weight:600}
  .stagewrap{flex:1;position:relative;overflow:hidden}
  .stage{position:absolute;inset:0}
  .frame{height:100%;display:grid;grid-template-columns:1fr 1fr}
  .stage.mobile .frame{max-width:420px;margin:0 auto;grid-template-columns:1fr;box-shadow:0 0 0 1px var(--border)}
  .pane{overflow:auto;padding:22px 22px 90px}
  .left{border-right:1px solid var(--border);background:var(--bg)}
  .right{background:var(--surface);padding:0;display:flex;flex-direction:column;overflow:hidden}
  .stage.mobile .right{display:none}
  h6{margin:0 0 8px;font-size:15px;font-weight:700}
  .body{font-size:13px;color:#4a4340;line-height:1.55;margin-bottom:14px}
  .muted{color:var(--muted)}.xs{font-size:11px}
  /* code card = elevated (rounded-3xl bg-surface shadow, NO border) — rule thầy 2026-07-18 */
  .code{border-radius:24px;overflow:hidden;margin-bottom:12px;background:var(--surface);box-shadow:var(--shadow)}
  .code .hd{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border)}
  .code .lang{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .code .cp{border:0;background:transparent;cursor:pointer;color:var(--muted);font-size:13px}
  .code pre{margin:0;padding:12px 14px;font-family:ui-monospace,monospace;font-size:12.5px;white-space:pre-wrap;color:#b45309}
  .tag{display:inline-block;font-size:10px;border:1px dashed var(--accent);color:var(--accent-soft-fg);border-radius:6px;padding:1px 5px;margin-left:6px;vertical-align:middle}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;width:fit-content}
  .c-warn{background:var(--warn-soft);color:var(--warn-fg)}.c-ok{background:var(--success-soft);color:var(--success-fg)}.c-neu{background:var(--surface2);color:var(--muted)}
  .dot{width:7px;height:7px;border-radius:999px;background:currentColor}.dot.pulse{animation:p 1s infinite}@keyframes p{50%{opacity:.3}}
  .callout{border-radius:18px;padding:12px 14px;margin-bottom:10px;display:flex;gap:10px}
  .callout.info{background:var(--accent-soft)}.callout.warn{background:var(--warn-soft)}
  .callout .ic{font-size:18px}.callout .t{font-size:13px;font-weight:600;color:var(--accent-soft-fg);margin-bottom:3px}
  .callout.warn .t{color:var(--warn-fg)} .callout .d{font-size:12.5px;color:#4a4340;line-height:1.5}
  .btn{border:0;border-radius:999px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;background:var(--accent);color:#fff}
  .btn.tert{background:var(--surface2);color:var(--fg)}.btn.sm{padding:6px 12px;font-size:12px}
  .steps{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}.steps span{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--surface2);color:var(--muted)}.steps .cur{background:var(--accent-soft);color:var(--accent-soft-fg);font-weight:600}.steps .done{background:var(--success-soft);color:var(--success-fg)}
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;padding:28px}
  .empty .ic{font-size:30px;color:var(--muted)}.empty .t{font-size:14px;font-weight:600}.empty .d{font-size:12px;color:var(--muted);max-width:300px}
  .constabs{display:flex;padding:0 16px;border-bottom:1px solid var(--border);background:var(--surface)}
  .constabs .t{font-size:13px;padding:12px 14px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .constabs .t.on{color:var(--accent-soft-fg);font-weight:600;border-bottom-color:var(--accent)}
  .console{flex:1;background:#1e1a19;color:#dfe7dd;font-family:ui-monospace,monospace;font-size:12px;padding:16px;overflow:auto}

  /* ── ConnectSheet: persistent draggable bottom-sheet (NEW block) ── */
  .sheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-top-left-radius:24px;border-top-right-radius:24px;
    box-shadow:0 -10px 30px -8px rgba(60,40,30,.22);z-index:30;display:flex;flex-direction:column;
    transition:height .28s cubic-bezier(.32,.72,0,1);touch-action:none}
  .sheet.drag{transition:none}
  .grab{display:flex;justify-content:center;padding:8px 0 2px;cursor:grab}
  .grab:active{cursor:grabbing}
  .grab .bar{width:38px;height:5px;border-radius:999px;background:var(--border)}
  .peek{display:flex;align-items:center;gap:10px;padding:6px 18px 12px;min-height:52px;cursor:pointer}
  .peek .sum{font-size:12px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .peek .chev{color:var(--muted);font-size:14px;transition:transform .28s}
  .sheet[data-open="1"] .peek .chev{transform:rotate(180deg)}
  .sbody{overflow:auto;padding:0 18px 20px;flex:1}
  .sheet[data-open="0"] .sbody{opacity:.25}
  .hint-drag{font-size:10.5px;color:var(--muted);opacity:.8}
  .note{padding:9px 16px;background:var(--surface2);border-top:1px solid var(--border);font-size:11px;color:var(--muted);z-index:40}
  kbd{font-family:ui-monospace,monospace;font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:1px 5px}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <b>Playground · ConnectSheet</b>
    <span class="muted">kéo grabber ↕ hoặc bấm peek để mở/thu</span>
    <div class="seg" id="seg">
      <button data-s="setup" class="on">Setup</button>
      <button data-s="waiting">Chờ máy</button>
      <button data-s="connected">Đã nối</button>
      <button data-s="lost">Máy ngắt</button>
      <button data-s="rag">RAG</button>
      <button data-dev="m">Mobile</button>
    </div>
  </div>

  <div class="stagewrap">
    <div class="stage" id="stage">
      <div class="frame">
        <div class="pane left" id="left"></div>
        <div class="pane right" id="right"></div>
      </div>
      <!-- ConnectSheet lives here, docked to the surface bottom -->
      <div class="sheet" id="sheet" data-open="0" style="height:64px">
        <div class="grab" id="grab"><div class="bar"></div></div>
        <div class="peek" id="peek"></div>
        <div class="sbody" id="sbody"></div>
      </div>
    </div>
  </div>
  <div class="note" id="note"></div>
</div>

<script>
const CODE="Z33ZUF"; let state="setup";
const npx = "npx @starciacademy/playground-agent "+CODE;
const codeCard=(lang,cmd)=>`<div class="code"><div class="hd"><span class="lang">${lang} <span class="tag">CodeToHtml elevated</span></span><button class="cp">⧉</button></div><pre>${cmd}</pre></div>`;
const stepGuide=()=>`<div class="steps"><span class="done">1</span><span class="cur">2</span><span>3</span><span>…</span><span>20</span></div>
  <h6>Chạy container đầu tiên</h6>
  <div class="body">Khởi động một container Nginx nền (detached) tên <code>starci-demo</code>.</div>
  ${codeCard('bash','docker run -d --name starci-demo nginx')}
  <div class="xs muted">Bước tự verify khi agent báo tài nguyên khớp — không cần bấm gì.</div>`;

/* per-state sheet config: peek(chip+summary+action) · body · default snap · sheet shown? */
const S = {
  setup:{
    show:true, open:0,
    chip:'<span class="chip c-neu"><span class="dot"></span>Máy chưa nối</span>',
    sum:'Nối máy thật để mở workspace',
    action:'<button class="btn sm" onclick="go(\'waiting\')">Kết nối máy thật →</button>',
    body:`<div class="body">Lab chạy trên MÁY BẠN (Docker/K8s), có hướng dẫn từng bước. Nối máy để bắt đầu — không có sandbox dựng sẵn.</div>
      <button class="btn" onclick="go('waiting')">Kết nối máy thật →</button>
      <div class="hint-drag" style="margin-top:10px">Sau khi tạo phiên, sheet này bung lên chứa lệnh nối máy.</div>`,
    concept:'peek: chip "chưa nối" + CTA · thu gọn (setup ít attention)'
  },
  waiting:{
    show:true, open:1,
    chip:'<span class="chip c-warn"><span class="dot pulse"></span>Đang chờ máy kết nối…</span>',
    sum:'kéo xuống để thu gọn · lệnh đang mở',
    action:'',
    body:`<div class="callout info"><div class="ic">🔌</div><div><div class="t">Kết nối máy của bạn</div><div class="d">Chạy lệnh này trong terminal trên máy bạn để nối vào phiên:</div></div></div>
      ${codeCard('bash',npx)}
      <div class="xs muted">Cần Node.js ≥ 18 (npx tự tải, không cần cài thường trực).</div>`,
    concept:'AUTO BUNG (attention) — lệnh pair là tâm điểm; peek = warning pulse'
  },
  connected:{
    show:true, open:0,
    chip:'<span class="chip c-ok"><span class="dot"></span>Máy đã kết nối · <b id="ping">42 ms</b></span>',
    sum:'workspace đã mở · kéo lên để đổi máy',
    action:'<button class="btn tert sm" onclick="toggle(1)">Kết nối lại / đổi máy</button>',
    body:`<div class="body">Độ trễ tới máy bạn đo mỗi 5s. Muốn đổi sang máy khác? Chạy lại lệnh dưới trên máy đó (tiến độ 20 bước giữ nguyên):</div>
      ${codeCard('bash',npx)}
      <div class="xs muted">Hoặc bật service-mode để agent tự chạy lại khi mất kết nối.</div>`,
    concept:'AUTO THU GỌN (workspace là focus) — peek: success + ping live + reconnect'
  },
  lost:{
    show:true, open:1,
    chip:'<span class="chip c-warn"><span class="dot pulse"></span>Máy vừa ngắt kết nối</span>',
    sum:'kết nối lại để đi tiếp · tiến độ đã giữ',
    action:'',
    body:`<div class="callout warn"><div class="ic">⚠️</div><div><div class="t">Kết nối lại để đi tiếp</div><div class="d">Tiến độ các bước đã xong được GIỮ. Chạy lại agent (máy cũ hoặc máy khác):</div></div></div>
      ${codeCard('bash',npx)}
      <div class="xs muted">Gõ lại lệnh — hoặc service-mode để tự nối lại.</div>`,
    concept:'AUTO BUNG (attention) — reconnect; giống waiting nhưng copy "vừa ngắt / tiến độ giữ"'
  },
  rag:{ show:false, concept:'RAG: KHÔNG agent → KHÔNG sheet' }
};

function renderMain(){
  const L=document.getElementById('left'),R=document.getElementById('right');
  if(state==='rag'){
    L.innerHTML=`<div class="steps"><span class="cur">1</span><span>2</span><span>3</span></div><h6>Hỏi RAG & kiểm chứng</h6><div class="body">Lab RAG chạy TRONG trình duyệt — <b>không cần agent</b>, không có sheet nối máy.</div><button class="btn">Bước sau →</button>`;
    R.innerHTML=`<div class="constabs"><span class="t on">RAG widget <span class="tag">RagPlayground</span></span></div><div class="console">[ import → hỏi → xem trích dẫn ]</div>`;
    return;
  }
  L.innerHTML = stepGuide();
  if(state==='connected'){
    R.innerHTML=`<div class="constabs"><span class="t on">Terminal</span><span class="t">Tài nguyên (1)</span><span class="tag" style="margin-left:auto">ExtendedTabs</span></div><div class="console">$ docker run -d --name starci-demo nginx<br>a1b2c3…<br><br>✓ Bước verified — Container starci-demo Running</div>`;
  } else {
    R.innerHTML=`<div class="empty"><div class="ic">▮</div><div class="t">Kết nối máy để mở workspace</div><div class="d">Nối máy ở thanh dưới — terminal + tài nguyên mở khi máy kết nối.</div><span class="tag">EmptyState</span></div>`;
  }
}

const sheet=document.getElementById('sheet'), peek=document.getElementById('peek'), sbody=document.getElementById('sbody');
const COLLAPSED=64;
function renderSheet(){
  const c=S[state];
  if(!c.show){ sheet.style.display='none'; return; }
  sheet.style.display='flex';
  peek.innerHTML = `${c.chip}<span class="sum">${c.sum}</span>${c.action||''}<span class="chev">▲</span>`;
  sbody.innerHTML = c.body;
  setOpen(c.open, true);
}
function expandedH(){ // content-based, capped
  const h = COLLAPSED + 14 + sbody.scrollHeight + 16;
  return Math.min(h, Math.round(window.innerHeight*0.62));
}
function setOpen(open, instant){
  sheet.dataset.open = open?'1':'0';
  if(instant) sheet.classList.add('drag');
  sheet.style.height = (open? expandedH() : COLLAPSED)+'px';
  if(instant) requestAnimationFrame(()=>sheet.classList.remove('drag'));
}
function toggle(force){ const open = force!=null?force : sheet.dataset.open==='0'; setOpen(open); }
peek.addEventListener('click',e=>{ if(e.target.closest('.btn'))return; toggle(); });

/* drag the grabber ↕ */
const grab=document.getElementById('grab'); let dragY=null, startH=0;
function down(y){ dragY=y; startH=sheet.getBoundingClientRect().height; sheet.classList.add('drag'); }
function move(y){ if(dragY==null)return; const dy=dragY-y; let h=startH+dy; h=Math.max(COLLAPSED,Math.min(h,Math.round(window.innerHeight*0.62))); sheet.style.height=h+'px'; }
function up(){ if(dragY==null)return; dragY=null; sheet.classList.remove('drag'); const h=sheet.getBoundingClientRect().height; const mid=(COLLAPSED+expandedH())/2; setOpen(h>mid); }
grab.addEventListener('pointerdown',e=>{grab.setPointerCapture(e.pointerId);down(e.clientY);});
grab.addEventListener('pointermove',e=>move(e.clientY));
grab.addEventListener('pointerup',up); grab.addEventListener('pointercancel',up);

function go(s){ state=s; paint(); }
function paint(){
  [...document.querySelectorAll('#seg [data-s]')].forEach(b=>b.classList.toggle('on',b.dataset.s===state));
  renderMain(); renderSheet();
  document.getElementById('note').innerHTML = `[${state}] · Sheet: <b>${S[state].concept}</b>`;
}
document.getElementById('seg').onclick=e=>{ if(e.target.dataset.s){state=e.target.dataset.s;paint();} if(e.target.dataset.dev){document.getElementById('stage').classList.toggle('mobile');e.target.classList.toggle('on');} };
/* live ping tick in connected peek */
setInterval(()=>{const el=document.getElementById('ping'); if(el){const ms=28+Math.floor(Math.random()*40);el.textContent=ms+' ms';}},1500);
paint();
</script>
</body>
</html>
