<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>RAG playground · Ollama machine-backed (docker-shell + Q&A pane + Chuẩn bị máy step-0)</title>
<style>
  :root{--bg:#faf7f5;--surface:#fff;--surface2:#f6f2ef;--border:#e7e0db;--fg:#241c1a;--muted:#8a7d76;
    --accent:#ec4899;--accent-soft:#fce7f3;--accent-soft-fg:#9d1f5f;
    --success-soft:#e3f5ee;--success-fg:#136b4f;--warn-soft:#fbf0dd;--warn-fg:#8a5510;--info-soft:#e6f0fb;--info-fg:#1f5b96;
    --code:#1e1a19;--codefg:#dfe7dd;
    --shadow:0 6px 20px -6px rgba(60,40,30,.18),0 2px 6px -2px rgba(60,40,30,.10);}
  *{box-sizing:border-box} body{margin:0;font-family:ui-sans-serif,system-ui,"Segoe UI",sans-serif;background:var(--bg);color:var(--fg)}
  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  .top{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);background:var(--surface);z-index:40;flex-wrap:wrap}
  .top b{font-size:14px}.top .muted{color:var(--muted);font-size:12px}
  .seg{margin-left:auto;display:inline-flex;border:1px solid var(--border);border-radius:999px;overflow:hidden;flex-wrap:wrap}
  .seg button{border:0;background:transparent;padding:6px 11px;font-size:12px;cursor:pointer;color:var(--muted)}
  .seg button.on{background:var(--accent-soft);color:var(--accent-soft-fg);font-weight:600}
  /* work-surface header band (BackLink + ProgressMeter) */
  .band{display:flex;flex-direction:column;gap:8px;padding:10px 18px;border-bottom:1px solid var(--border);background:var(--surface)}
  .band .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .band .back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer}
  .band .cnt{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap}
  .meter{height:6px;border-radius:999px;background:var(--surface2);overflow:hidden}.meter>i{display:block;height:100%;background:var(--accent);transition:width .25s}
  .stagewrap{flex:1;position:relative;overflow:hidden}
  .stage{position:absolute;inset:0;display:flex;flex-direction:column}
  .frame{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0}
  .stage.mobile .frame{max-width:430px;margin:0 auto;grid-template-columns:1fr;box-shadow:0 0 0 1px var(--border)}
  .pane{overflow:auto;padding:20px 20px 96px}
  .left{border-right:1px solid var(--border);background:var(--bg)}
  .right{background:var(--surface);padding:0;display:flex;flex-direction:column;overflow:hidden}
  .stage.mobile .right{display:none}
  h6{margin:0 0 4px;font-size:16px;font-weight:700}
  .body{font-size:13px;color:#4a4340;line-height:1.55;margin:8px 0 14px}
  .muted{color:var(--muted)}.xs{font-size:11px}.hl{color:var(--accent-soft-fg);font-weight:600}
  code{background:var(--surface2);border-radius:5px;padding:1px 5px;font-family:ui-monospace,monospace;font-size:12px}
  /* code card = elevated on canvas / recessed on surface */
  .codecard{border-radius:20px;overflow:hidden;margin:10px 0;background:var(--surface);box-shadow:var(--shadow)}
  .codecard.well{box-shadow:none;background:var(--surface2)}
  .codecard .hd{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;border-bottom:1px solid var(--border)}
  .codecard .lang{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .codecard .cp{border:0;background:transparent;cursor:pointer;color:var(--muted);font-size:13px}
  .codecard pre{margin:0;padding:11px 13px;font-family:ui-monospace,monospace;font-size:12px;white-space:pre-wrap;color:#b45309}
  .tag{display:inline-block;font-size:9.5px;border:1px dashed var(--accent);color:var(--accent-soft-fg);border-radius:6px;padding:1px 5px;margin-left:6px;vertical-align:middle}
  .tag.new{border-style:solid;border-color:var(--success-fg);color:var(--success-fg)}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 11px;border-radius:999px;width:fit-content}
  .c-warn{background:var(--warn-soft);color:var(--warn-fg)}.c-ok{background:var(--success-soft);color:var(--success-fg)}.c-neu{background:var(--surface2);color:var(--muted)}.c-info{background:var(--accent-soft);color:var(--accent-soft-fg)}
  .dot{width:7px;height:7px;border-radius:999px;background:currentColor}.dot.pulse{animation:p 1s infinite}@keyframes p{50%{opacity:.3}}
  .callout{border-radius:16px;padding:12px 14px;margin:10px 0;display:flex;gap:10px}
  .callout.info{background:var(--accent-soft)}.callout.warn{background:var(--warn-soft)}.callout.ok{background:var(--success-soft)}
  .callout .ic{font-size:18px}.callout .t{font-size:13px;font-weight:700;color:var(--accent-soft-fg);margin-bottom:3px}
  .callout.warn .t{color:var(--warn-fg)}.callout.ok .t{color:var(--success-fg)}.callout .d{font-size:12.5px;color:#4a4340;line-height:1.5}
  .btn{border:0;border-radius:999px;padding:10px 17px;font-size:13px;font-weight:600;cursor:pointer;background:var(--accent);color:#fff}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.tert{background:var(--surface2);color:var(--fg)}.btn.sm{padding:6px 12px;font-size:12px}.btn.block{width:100%}
  .steps{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}.steps span{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--surface2);color:var(--muted)}.steps .cur{background:var(--accent-soft);color:var(--accent-soft-fg);font-weight:600}.steps .done{background:var(--success-soft);color:var(--success-fg)}
  .actionhint{border:1px dashed var(--border);border-radius:12px;background:var(--surface2);padding:11px 13px;font-size:13px;line-height:1.5;margin-top:6px}
  .actionhint b{color:var(--accent-soft-fg)}
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;padding:28px}
  .empty .ic{font-size:30px;color:var(--muted)}.empty .t{font-size:14px;font-weight:600}.empty .d{font-size:12px;color:var(--muted);max-width:320px}
  /* OS tabs (ExtendedTabs) */
  .ostabs{display:flex;gap:4px;margin:2px 0 8px}
  .ostabs button{border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:5px 12px;font:inherit;font-size:12px;cursor:pointer;color:var(--muted)}
  .ostabs button.on{border-color:var(--accent);color:var(--accent-soft-fg);font-weight:700;background:var(--accent-soft)}
  /* numbered guide sections (step-0 prepare) */
  .gstep{display:flex;gap:12px;margin-bottom:8px}
  .gnum{flex:none;width:26px;height:26px;border-radius:999px;background:var(--accent-soft);color:var(--accent-soft-fg);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;margin-top:2px}
  .gstep.done .gnum{background:var(--success-soft);color:var(--success-fg)}
  .gttl{font-size:14px;font-weight:700}
  /* readiness checklist (ListRow + StatusChip) */
  .rdhead{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:14px 16px 8px}
  .rrow{display:flex;align-items:center;gap:11px;padding:12px 16px;border-bottom:1px solid var(--border)}
  .rrow:last-child{border-bottom:0}
  .rtile{flex:none;width:34px;height:34px;border-radius:11px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted)}
  .rrow.ok .rtile{background:var(--success-soft);color:var(--success-fg)}
  .rtx{flex:1;min-width:0}.rtx .n{font-size:13px;font-weight:600}.rtx .s{font-size:11.5px;color:var(--muted)}
  /* RAG workspace: tab strip + Q&A + citation bubbles */
  .constabs{display:flex;padding:0 14px;border-bottom:1px solid var(--border);background:var(--surface);flex:none}
  .constabs .t{font-size:13px;padding:12px 13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:7px}
  .constabs .t.on{color:var(--accent-soft-fg);font-weight:600;border-bottom-color:var(--accent)}
  .constabs .cnt{margin-left:auto}
  .wsbody{flex:1;overflow:auto;padding:16px}
  .qa{display:flex;flex-direction:column;gap:12px}
  .bub{max-width:88%;padding:11px 14px;border-radius:18px;font-size:13px;line-height:1.55}
  .bub.me{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:6px}
  .bub.ai{align-self:flex-start;background:var(--surface2);color:var(--fg);border-bottom-left-radius:6px}
  .askbar{flex:none;border-top:1px solid var(--border);padding:11px 14px;display:flex;gap:8px;background:var(--surface)}
  .askbar input{flex:1;border:1px solid var(--border);border-radius:999px;padding:9px 14px;font:inherit;font-size:13px;background:var(--bg)}
  .askbar .send{flex:none;width:38px;height:38px;border-radius:999px;border:0;background:var(--accent);color:#fff;font-size:16px;cursor:pointer}
  .cite{border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:9px;background:var(--bg)}
  .cite .f{font-size:12px;font-weight:700;color:var(--accent-soft-fg);display:flex;align-items:center;gap:6px}
  .cite .sn{font-size:11px;color:var(--muted);font-family:ui-monospace,monospace;margin-top:5px;white-space:pre-wrap;line-height:1.5}
  .cite .score{margin-left:auto;font-size:10px;background:var(--accent-soft);color:var(--accent-soft-fg);border-radius:20px;padding:1px 7px;font-weight:700}
  /* Nguồn: 2 render modes (plain document | xyflow bubbles) */
  .citetog{display:flex;gap:4px;margin-bottom:12px;align-items:center}
  .citetog button{border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:5px 11px;font:inherit;font-size:12px;cursor:pointer;color:var(--muted)}
  .citetog button.on{border-color:var(--accent);color:var(--accent-soft-fg);font-weight:700;background:var(--accent-soft)}
  /* mode 1: plain document — flowing passages, highlighted retrieved span */
  .doc .dsec{margin-bottom:16px}
  .doc .dfile{font-size:11px;font-weight:800;color:var(--accent-soft-fg);font-family:ui-monospace,monospace;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .doc .dtext{font-size:12px;font-family:ui-monospace,monospace;color:#4a4340;line-height:1.7;white-space:pre-wrap;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 13px}
  .doc mark{background:var(--accent-soft);color:var(--accent-soft-fg);border-radius:3px;padding:0 2px}
  /* mode 2: xyflow bubbles — node/edge graph */
  .flowwrap{position:relative;background:var(--bg);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .flowwrap .dots{position:absolute;inset:0;background-image:radial-gradient(var(--border) 1px,transparent 1px);background-size:16px 16px;opacity:.6}
  .fnode{position:absolute;transform:translate(-50%,-50%);border:1px solid var(--border);background:var(--surface);border-radius:12px;padding:8px 11px;box-shadow:var(--shadow);width:132px}
  .fnode .ft{font-size:11px;font-weight:700;font-family:ui-monospace,monospace;color:var(--accent-soft-fg);display:flex;align-items:center;gap:5px}
  .fnode .fs{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.4;max-height:28px;overflow:hidden}
  .fnode.q{background:var(--accent);border-color:var(--accent);width:150px}
  .fnode.q .ft{color:#fff}.fnode.q .fs{color:#ffe3f1}
  .fscore{position:absolute;transform:translate(-50%,-50%);font-size:10px;font-weight:800;background:var(--surface);border:1px solid var(--border);color:var(--accent-soft-fg);border-radius:20px;padding:1px 7px;z-index:5}
  .locked{filter:grayscale(.7) opacity(.5);pointer-events:none}
  /* ConnectSheet */
  .sheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-top-left-radius:22px;border-top-right-radius:22px;
    box-shadow:0 -10px 30px -8px rgba(60,40,30,.22);z-index:30;display:flex;flex-direction:column;
    transition:height .28s cubic-bezier(.32,.72,0,1);touch-action:none}
  .sheet.drag{transition:none}
  .grab{display:flex;justify-content:center;padding:8px 0 2px;cursor:grab}.grab .bar{width:38px;height:5px;border-radius:999px;background:var(--border)}
  .peek{display:flex;align-items:center;gap:10px;padding:6px 18px 12px;min-height:50px;cursor:pointer;flex-wrap:wrap}
  .peek .sum{font-size:12px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .peek .chev{color:var(--muted);font-size:13px;transition:transform .28s}
  .sheet[data-open="1"] .peek .chev{transform:rotate(180deg)}
  .sbody{overflow:auto;padding:0 18px 20px;flex:1}
  .note{padding:9px 16px;background:var(--surface2);border-top:1px solid var(--border);font-size:11px;color:var(--muted);z-index:40;line-height:1.5}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <b>RAG playground · Ollama</b>
    <span class="muted">docker-shell · tab phải = Hỏi đáp + Nguồn · onboarding = Chuẩn bị máy (bước 0)</span>
    <div class="seg" id="seg">
      <button data-s="setup" class="on">Setup</button>
      <button data-s="prepare">Chuẩn bị máy (0)</button>
      <button data-s="work">Workspace</button>
      <button data-s="dropped">Ollama ngắt</button>
      <button data-dev="m">Mobile</button>
    </div>
  </div>

  <div class="band" id="band"></div>

  <div class="stagewrap">
    <div class="stage" id="stage">
      <div class="frame">
        <div class="pane left" id="left"></div>
        <div class="pane right" id="right"></div>
      </div>
      <div class="sheet" id="sheet" data-open="0" style="height:62px">
        <div class="grab" id="grab"><div class="bar"></div></div>
        <div class="peek" id="peek"></div>
        <div class="sbody" id="sbody"></div>
      </div>
    </div>
  </div>
  <div class="note" id="note"></div>
</div>

<script>
const CODE="R4G-K9F2", PAIR="npx @starciacademy/playground-agent R4G-K9F2";
const codeCard=(lang,cmd,well)=>`<div class="codecard${well?' well':''}"><div class="hd"><span class="lang">${lang}<span class="tag">MarkdownContent</span></span><button class="cp">⧉</button></div><pre>${cmd}</pre></div>`;

/* ---------- OS install (step 1 of prepare) ---------- */
const OS={
  mac:{label:'macOS',cmd:'brew install ollama\n# hoặc tải app: https://ollama.com/download'},
  win:{label:'Windows',cmd:'winget install Ollama.Ollama\n# hoặc tải installer: https://ollama.com/download'},
  linux:{label:'Linux',cmd:'curl -fsSL https://ollama.com/install.sh | sh'}
};
let os='mac';
const osTabs=()=>`<div class="ostabs">${Object.entries(OS).map(([k,v])=>`<button class="${k===os?'on':''}" onclick="setOs('${k}')">${v.label}</button>`).join('')}<span class="tag" style="align-self:center">ExtendedTabs</span></div>`;

/* ---------- readiness state (net-new: agent must report ollama) ---------- */
const REQS=[
  {id:'agent', icon:'🔌', n:'Starci agent', okS:'Đã nối · 41 ms', noS:'Chưa nối máy'},
  {id:'serve', icon:'🟢', n:'Ollama đang chạy', okS:'Cổng :11434 phản hồi', noS:'Chưa thấy ollama serve'},
  {id:'embed', icon:'🧬', n:'Model embedding', okS:'nomic-embed-text đã tải', noS:'Chưa có nomic-embed-text'},
  {id:'gen',   icon:'💬', n:'Model sinh câu', okS:'qwen2.5:3b đã tải', noS:'Chưa có qwen2.5:3b'},
];
// progress of onboarding for the demo: how many reqs are green
let ready=0; // 0..4
const allReady=()=>ready>=REQS.length;

const readinessPanel=()=>`
  <div class="rdhead">Trạng thái máy <span class="tag new">ReadinessChecklist · net-new</span></div>
  ${REQS.map((r,i)=>`<div class="rrow ${i<ready?'ok':''}">
    <div class="rtile">${i<ready?'✓':r.icon}</div>
    <div class="rtx"><div class="n">${r.n}</div><div class="s">${i<ready?r.okS:r.noS}</div></div>
    ${i<ready?'<span class="chip c-ok"><span class="dot"></span>Sẵn sàng</span>':'<span class="chip c-neu"><span class="dot"></span>Chờ</span>'}
  </div>`).join('')}
  <div style="padding:14px 16px">
    <button class="btn block" ${allReady()?'':'disabled'} onclick="go('work')">${allReady()?'Bắt đầu lab →':`Còn ${REQS.length-ready} mục chưa xong`}</button>
    <div class="xs muted" style="text-align:center;margin-top:8px">${allReady()?'Đủ điều kiện — workspace RAG mở ra.':'Agent tự dò lại mỗi 3s — không cần bấm gì.'}</div>
    <div style="text-align:center;margin-top:10px"><button class="btn tert sm" onclick="tick()">▶ demo: agent dò xong 1 mục</button></div>
  </div>`;

/* ---------- RAG workspace right pane (Hỏi đáp | Nguồn) ---------- */
let wsTab='qa';
const qaBody=()=>`<div class="qa">
    <div class="bub me">File <code>retrieval.ts</code> dùng để làm gì?</div>
    <div class="bub ai">Đoạn này triển khai <b>cosine-similarity top-k</b>: nhận query-embedding rồi so với các vector chunk đã index, trả về k đoạn gần nhất. Nhúng &amp; sinh câu chạy <b>trên Ollama máy bạn</b> (embed <code>nomic-embed-text</code>, sinh <code>qwen2.5:3b</code>) — không gửi lên server.</div>
    <div class="bub me">Hàm <code>topK</code> xử lý mảng rỗng thế nào?</div>
    <div class="bub ai">Trả về <code>[]</code> ngay khi chưa có chunk nào được index — xem trích dẫn nguồn bên tab <b>Nguồn</b>.</div>
  </div>`;
/* Nguồn: 2 kiểu render (thầy 2026-07-19) — ① plain document ② bong bóng xyflow */
let citeMode='doc';
const SRC=[
  {f:'retrieval.ts',score:'0.91',text:'export function topK(q: number[], k=5){\n  <mark>if(!store.length) return []</mark>\n  return store.map(...).sort(...).slice(0,k)\n}'},
  {f:'embed.ts',score:'0.78',text:'// nhúng chạy trên Ollama local :11434\n<mark>await ollama.embeddings({model:\'nomic-embed-text\', prompt})</mark>'},
  {f:'sample.ts',score:'0.64',text:'const store: {id:string; vec:number[]}[] = []'}
];
const citeToggle=()=>`<div class="citetog"><button class="${citeMode==='doc'?'on':''}" onclick="setCite('doc')">📄 Tài liệu</button><button class="${citeMode==='flow'?'on':''}" onclick="setCite('flow')">🫧 Sơ đồ</button><span class="tag new" style="margin-left:auto">2 render · xyflow</span></div>`;
const citeDoc=()=>`<div class="doc">${SRC.map(s=>`<div class="dsec"><div class="dfile">📄 ${s.f}<span class="score" style="margin-left:auto">${s.score}</span></div><div class="dtext">${s.text}</div></div>`).join('')}</div>`;
/* xyflow-style graph: query node (left) → source bubbles (fanned right), edge = similarity */
const citeFlow=()=>{
  const q={x:20,y:50};             // % positions
  const nodes=[{x:74,y:20},{x:82,y:52},{x:70,y:85}];
  const edge=(a,b)=>{const x1=a.x,y1=a.y,x2=b.x,y2=b.y;return `<path d="M ${x1} ${y1} C ${(x1+x2)/2} ${y1}, ${(x1+x2)/2} ${y2}, ${x2} ${y2}" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity=".5"/>`;};
  return `<div class="flowwrap" style="height:270px"><div class="dots"></div>
    <svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%">
      ${nodes.map(n=>edge(q,n)).join('')}
    </svg>
    <div class="fnode q" style="left:${q.x}%;top:${q.y}%"><div class="ft">💬 Câu hỏi</div><div class="fs">topK xử lý mảng rỗng?</div></div>
    ${SRC.map((s,i)=>`<div class="fnode" style="left:${nodes[i].x}%;top:${nodes[i].y}%"><div class="ft">📄 ${s.f}</div><div class="fs">${s.text.replace(/<\/?mark>/g,'').split('\n')[0]}</div></div>`).join('')}
    ${SRC.map((s,i)=>`<div class="fscore" style="left:${(q.x+nodes[i].x)/2}%;top:${(q.y+nodes[i].y)/2}%">${s.score}</div>`).join('')}
  </div><div class="xs muted" style="margin-top:8px">Node = câu hỏi + đoạn nguồn được truy hồi · cạnh = độ tương đồng (kéo/zoom như React Flow).</div>`;
};
const citeBody=()=>`<div style="padding:2px 0">${citeToggle()}${citeMode==='doc'?citeDoc():citeFlow()}</div>`;
const ragWorkspace=(locked)=>`
  <div class="constabs">
    <span class="t ${wsTab==='qa'?'on':''}" onclick="setTab('qa')">💬 Hỏi đáp</span>
    <span class="t ${wsTab==='cite'?'on':''}" onclick="setTab('cite')">📄 Nguồn <span class="chip c-neu" style="padding:1px 7px;font-size:10px">3</span></span>
    <span class="tag cnt" style="align-self:center">ExtendedTabs · RagPlayground</span>
  </div>
  <div class="wsbody ${locked?'locked':''}">${wsTab==='qa'?qaBody():citeBody()}</div>
  <div class="askbar ${locked?'locked':''}"><input placeholder="Hỏi về code đã nạp… (chạy trên Ollama máy bạn)"><button class="send">➤</button></div>`;

/* ---------- SCREENS ---------- */
const SCREENS={
  setup:{
    band:{back:'← Thoát', cnt:'Bước 0 · Chuẩn bị', prog:2},
    left:()=>`<div class="steps"><span class="cur">Chuẩn bị</span><span>1</span><span>…</span><span>20</span></div>
      <h6>Lab RAG chạy trên máy bạn</h6>
      <div class="body">Khác các lab khác, RAG này dựng một <b>RAG thật ngay trên máy bạn</b>: nhúng &amp; sinh câu bằng <b>Ollama</b> (local, riêng tư, miễn phí) — starci agent nối trình duyệt với máy. Cần chuẩn bị máy một lần trước khi vào 20 bước.</div>
      <div class="callout info"><div class="ic">🦙</div><div><div class="t">Vì sao Ollama?</div><div class="d">Để bạn tự tay chạy pipeline RAG (index → truy hồi → sinh câu có trích dẫn) trên LLM local, hiểu cơ chế thay vì gọi API sẵn.</div></div></div>
      <button class="btn block" onclick="go('prepare')">Chuẩn bị máy →</button>`,
    right:()=>`<div class="empty"><div class="ic">🦙</div><div class="t">Chuẩn bị máy để mở Hỏi đáp RAG</div><div class="d">Cài Ollama + nối agent ở bước Chuẩn bị. Workspace hỏi-đáp mở khi máy sẵn sàng.<span class="tag">EmptyState</span></div></div>`,
    sheet:{show:true,open:0,
      chip:'<span class="chip c-neu"><span class="dot"></span>Máy chưa nối · cần Ollama</span>',
      sum:'Bấm Chuẩn bị máy để bắt đầu',
      action:'<button class="btn sm" onclick="go(\'prepare\')">Chuẩn bị máy →</button>',
      body:`<div class="body">Lab RAG chạy trên MÁY BẠN với Ollama. Vào bước <b>Chuẩn bị máy</b> để cài Ollama, tải model và nối agent.</div>`,
      note:'peek gọn (setup ít attention) — CTA dẫn sang màn Chuẩn bị máy (step-0)'}
  },
  prepare:{
    band:{back:'← Thoát', cnt:'Bước 0 · Chuẩn bị máy', prog:2},
    left:()=>`<h6>Chuẩn bị máy cho RAG <span class="tag new">màn step-0 · net-new</span></h6>
      <div class="body">Làm 3 việc dưới — panel bên phải tự tick xanh khi agent dò thấy. Đủ 4 mục là vào lab được.</div>
      <div class="gstep ${ready>=2?'done':''}"><div class="gnum">1</div><div><div class="gttl">Cài &amp; chạy Ollama</div>
        ${osTabs()}${codeCard('bash',OS[os].cmd)}<div class="xs muted">Sau khi cài, Ollama tự chạy nền ở <code>:11434</code>.</div></div></div>
      <div class="gstep ${ready>=4?'done':''}"><div class="gnum">2</div><div><div class="gttl">Tải 2 model (embedding + sinh câu)</div>
        ${codeCard('bash','ollama pull nomic-embed-text\nollama pull qwen2.5:3b')}<div class="xs muted">~1.5 GB. Tải một lần, lần sau dùng lại.</div></div></div>
      <div class="gstep ${ready>=1?'done':''}"><div class="gnum">3</div><div><div class="gttl">Nối starci agent</div>
        ${codeCard('bash',PAIR)}<div class="xs muted">Cần Node ≥ 18 (npx tự tải). Agent cầu nối trình duyệt ↔ Ollama máy bạn.</div></div></div>`,
    right:()=>readinessPanel(),
    sheet:{show:false, note:'màn Chuẩn bị: readiness panel Ở RIGHT thay cho sheet — sheet ẩn (tránh 2 nơi cùng nói trạng thái nối)'}
  },
  work:{
    band:{back:'← Thoát', cnt:'Bước 3 / 20', prog:15},
    left:()=>`<div class="steps"><span class="done">0</span><span class="done">1</span><span class="done">2</span><span class="cur">3</span><span>…</span><span>20</span></div>
      <h6>Hỏi một câu bám theo (multi-turn)</h6>
      <div class="body">Hỏi sâu hơn về chi tiết vừa được trả lời, không cần nạp lại nguồn.</div>
      <div class="xs muted" style="font-weight:800;text-transform:uppercase;letter-spacing:.03em">Hành động gợi ý · actionHint</div>
      <div class="actionhint">Gõ tiếp một câu hỏi khác vào ô <b>Hỏi đáp</b> bên phải, không đổi nguồn đã nạp. Xem model <b>qwen2.5:3b</b> trên máy bạn trả lời + trích nguồn.</div>
      <div style="border-top:1px solid var(--border);margin-top:16px;padding-top:14px">
        <button class="btn" onclick="alert('verify: RAG báo asked/answered → agent xác nhận → sang bước 4')">Đánh dấu xong bước →</button>
        <div class="xs muted" style="margin-top:8px">Verify = workspace RAG báo "đã hỏi/đã trả lời" (thay resources của docker).</div>
      </div>`,
    right:()=>ragWorkspace(false),
    sheet:{show:true,open:0,
      chip:'<span class="chip c-ok"><span class="dot"></span>Máy + Ollama sẵn sàng · <b id="ping">41 ms</b></span>',
      sum:'workspace mở · kéo lên để đổi máy / kiểm Ollama',
      action:'<button class="btn tert sm" onclick="toggle(1)">Kết nối lại</button>',
      body:`<div class="callout ok"><div class="ic">✅</div><div><div class="t">Máy sẵn sàng</div><div class="d">Agent nối, Ollama chạy, 2 model đã tải. Đổi máy? Chạy lại lệnh dưới trên máy đó (tiến độ giữ nguyên).</div></div></div>${codeCard(' bash',PAIR,true)}`,
      note:'AUTO THU GỌN (workspace là focus) — peek: success + Ollama ok + ping live'}
  },
  dropped:{
    band:{back:'← Thoát', cnt:'Bước 3 / 20', prog:15},
    left:()=>`<div class="steps"><span class="done">2</span><span class="cur">3</span><span>…</span></div>
      <h6>Hỏi một câu bám theo (multi-turn)</h6>
      <div class="body">Tiến độ đã giữ. Bật lại Ollama trên máy để hỏi tiếp.</div>
      <div class="actionhint" style="opacity:.6">Ô Hỏi đáp tạm khoá tới khi Ollama chạy lại.</div>`,
    right:()=>ragWorkspace(true),
    sheet:{show:true,open:1,
      chip:'<span class="chip c-warn"><span class="dot pulse"></span>Ollama đã dừng trên máy</span>',
      sum:'chạy lại ollama serve để hỏi tiếp · tiến độ giữ',
      action:'',
      body:`<div class="callout warn"><div class="ic">⚠️</div><div><div class="t">Bật lại Ollama để đi tiếp</div><div class="d">Agent vẫn nối nhưng cổng <code>:11434</code> ngừng phản hồi. Chạy lại rồi hỏi tiếp — tiến độ 20 bước GIỮ nguyên.</div></div></div>${codeCard('bash','ollama serve',true)}<div class="xs muted">Hoặc bật service-mode để Ollama tự chạy khi khởi động máy.</div>`,
      note:'AUTO BUNG (attention) — phân biệt "agent ngắt" (docker) vs "Ollama ngắt" (RAG-riêng): agent còn nối, chỉ LLM tắt'}
  }
};

let state='setup';
function renderBand(){
  const b=SCREENS[state].band, el=document.getElementById('band');
  el.innerHTML=`<div class="row"><span class="back">${b.back}</span><span class="cnt">${b.cnt}</span></div><div class="meter"><i style="width:${b.prog/20*100}%"></i></div>`;
}
function renderMain(){
  document.getElementById('left').innerHTML=SCREENS[state].left();
  document.getElementById('right').innerHTML=SCREENS[state].right();
}
const sheet=document.getElementById('sheet'),peek=document.getElementById('peek'),sbody=document.getElementById('sbody');
const COLLAPSED=62;
function renderSheet(){
  const c=SCREENS[state].sheet;
  if(!c.show){sheet.style.display='none';return;}
  sheet.style.display='flex';
  peek.innerHTML=`${c.chip}<span class="sum">${c.sum}</span>${c.action||''}<span class="chev">▲</span>`;
  sbody.innerHTML=c.body||'';
  setOpen(c.open,true);
}
function expandedH(){return Math.min(COLLAPSED+14+sbody.scrollHeight+16, Math.round(window.innerHeight*0.6));}
function setOpen(open,instant){sheet.dataset.open=open?'1':'0';if(instant)sheet.classList.add('drag');sheet.style.height=(open?expandedH():COLLAPSED)+'px';if(instant)requestAnimationFrame(()=>sheet.classList.remove('drag'));}
function toggle(force){const open=force!=null?force:sheet.dataset.open==='0';setOpen(open);}
peek.addEventListener('click',e=>{if(e.target.closest('.btn'))return;toggle();});
const grab=document.getElementById('grab');let dragY=null,startH=0;
grab.addEventListener('pointerdown',e=>{grab.setPointerCapture(e.pointerId);dragY=e.clientY;startH=sheet.getBoundingClientRect().height;sheet.classList.add('drag');});
grab.addEventListener('pointermove',e=>{if(dragY==null)return;let h=startH+(dragY-e.clientY);h=Math.max(COLLAPSED,Math.min(h,Math.round(window.innerHeight*0.6)));sheet.style.height=h+'px';});
function up(){if(dragY==null)return;dragY=null;sheet.classList.remove('drag');const h=sheet.getBoundingClientRect().height;setOpen(h>(COLLAPSED+expandedH())/2);}
grab.addEventListener('pointerup',up);grab.addEventListener('pointercancel',up);

function paint(){
  [...document.querySelectorAll('#seg [data-s]')].forEach(b=>b.classList.toggle('on',b.dataset.s===state));
  renderBand();renderMain();renderSheet();
  document.getElementById('note').innerHTML=`[<b>${state}</b>] ${SCREENS[state].sheet.note||''}`;
}
function go(s){state=s;paint();}
function setOs(k){os=k;renderMain();}
function setTab(t){wsTab=t;renderMain();}
function setCite(m){citeMode=m;renderMain();}
function tick(){ready=Math.min(REQS.length,ready+1);renderMain();}
document.getElementById('seg').onclick=e=>{if(e.target.dataset.s){state=e.target.dataset.s;paint();}if(e.target.dataset.dev){document.getElementById('stage').classList.toggle('mobile');e.target.classList.toggle('on');}};
setInterval(()=>{const el=document.getElementById('ping');if(el){el.textContent=(30+Math.floor(Math.random()*30))+' ms';}},1500);
paint();
</script>
</body>
</html>
