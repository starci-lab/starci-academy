<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 372 128" width="372" height="128" fill="none">
  <defs>
    <linearGradient id="lkTeal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#19E0CC"/>
      <stop offset="48%" stop-color="#00B7A6"/>
      <stop offset="100%" stop-color="#00897E"/>
    </linearGradient>
    <linearGradient id="lkMarkTeal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22E8D3"/>
      <stop offset="50%" stop-color="#00BBA9"/>
      <stop offset="100%" stop-color="#008A7F"/>
    </linearGradient>
    <radialGradient id="lkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5BF0E0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5BF0E0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Square mark (S + sparkle) -->
  <svg x="8" y="14" width="100" height="100" viewBox="0 0 512 512">
    <rect x="16" y="16" width="480" height="480" rx="116" fill="#0C1413"/>
    <rect x="16" y="16" width="480" height="480" rx="116" fill="none" stroke="#16302C" stroke-width="3"/>
    <text x="256" y="400" font-family="'Open Sans','Segoe UI',system-ui,Arial,sans-serif"
          font-size="400" font-weight="800" text-anchor="middle" fill="url(#lkMarkTeal)">S</text>
    <circle cx="372" cy="150" r="60" fill="url(#lkGlow)"/>
    <path d="M372 102 Q372 150 420 150 Q372 150 372 198 Q372 150 324 150 Q372 150 372 102 Z" fill="#22E8D3"/>
  </svg>

  <!-- Wordmark (no sparkle — the mark carries it) -->
  <text x="126" y="72"
        font-family="'Open Sans','Segoe UI',system-ui,Arial,sans-serif"
        font-size="60" font-weight="800" letter-spacing="-1" fill="url(#lkTeal)">STARCI</text>
  <text x="128" y="102"
        font-family="'Open Sans','Segoe UI',system-ui,Arial,sans-serif"
        font-size="19" font-weight="600" letter-spacing="10.5" fill="#6C8AA3">ACADEMY</text>
</svg>
